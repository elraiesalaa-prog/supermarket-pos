```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>نظام المبيعات</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 p-6">

<h1 class="text-2xl font-bold mb-4 text-center">نظام المبيعات</h1>

<div class="bg-white p-4 rounded shadow mb-4">

<label>العميل</label>
<select id="customer" class="border p-2 w-full mb-3"></select>

<label>طريقة الدفع</label>
<select id="pay_method" class="border p-2 w-full mb-3">
<option value="cash">نقد</option>
<option value="bank">تحويل</option>
<option value="later">آجل</option>
</select>

</div>

<div class="bg-white p-4 rounded shadow mb-4">

<label>المنتج</label>
<select id="product" class="border p-2 w-full mb-3"></select>

<div class="grid grid-cols-3 gap-2">

<input id="price" placeholder="السعر" class="border p-2" readonly>

<input id="stock" placeholder="المخزون" class="border p-2" readonly>

<input id="qty" type="number" placeholder="الكمية" class="border p-2">

</div>

<button onclick="addToCart()" class="bg-blue-600 text-white px-4 py-2 mt-3 rounded">
إضافة للسلة
</button>

</div>

<div class="bg-white p-4 rounded shadow mb-4">

<h2 class="font-bold mb-2">سلة المشتريات</h2>

<table class="w-full text-center border">

<thead class="bg-gray-200">

<tr>
<th>المنتج</th>
<th>السعر</th>
<th>الكمية</th>
<th>المجموع</th>
<th>حذف</th>
</tr>

</thead>

<tbody id="cart"></tbody>

</table>

<div class="mt-3 font-bold">
الإجمالي: <span id="total">0</span>
</div>

</div>

<div class="flex gap-3">

<button onclick="showInvoice()" class="bg-yellow-600 text-white px-4 py-2 rounded">
عرض الفاتورة
</button>

<button onclick="saveSale()" class="bg-green-600 text-white px-4 py-2 rounded">
إتمام البيع
</button>

</div>

<div id="invoiceBox" class="hidden bg-white p-4 mt-5 rounded shadow"></div>

<script>

const supabase = window.supabase.createClient(
"https://vmxbedovoahuggfpcmyk.supabase.co",
"sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU"
);

let products = []
let cart = []

async function loadCustomers(){

const {data} = await supabase
.from("customers")
.select("id_customer,first_name")

const select = document.getElementById("customer")
select.innerHTML=""

data.forEach(c=>{

let op=document.createElement("option")
op.value=c.id_customer
op.textContent=c.first_name

select.appendChild(op)

})

}

async function loadProducts(){

const {data} = await supabase
.from("products")
.select("id_product,product_name,seal_price,qte_in_stock")

products=data

const select=document.getElementById("product")

select.innerHTML=""

data.forEach(p=>{

let op=document.createElement("option")

op.value=p.id_product
op.textContent=p.product_name

select.appendChild(op)

})

showProduct()

}

function showProduct(){

const id=document.getElementById("product").value

const p=products.find(x=>x.id_product==id)

if(!p)return

document.getElementById("price").value=p.seal_price
document.getElementById("stock").value=p.qte_in_stock

}

document.getElementById("product").addEventListener("change",showProduct)

function addToCart(){

const id=document.getElementById("product").value
const qty=parseFloat(document.getElementById("qty").value)

const p=products.find(x=>x.id_product==id)

if(!qty || qty<=0){

alert("ادخل الكمية")
return

}

if(qty>p.qte_in_stock){

alert("المخزون غير كافي")
return

}

cart.push({

id_product:p.id_product,
name:p.product_name,
price:p.seal_price,
qty:qty,
total:qty*p.seal_price

})

renderCart()

}

function renderCart(){

const table=document.getElementById("cart")

table.innerHTML=""

let total=0

cart.forEach((i,index)=>{

total+=i.total

table.innerHTML+=`

<tr>

<td>${i.name}</td>
<td>${i.price}</td>
<td>${i.qty}</td>
<td>${i.total}</td>

<td>
<button onclick="removeItem(${index})" class="text-red-600">
حذف
</button>
</td>

</tr>

`

})

document.getElementById("total").innerText=total

}

function removeItem(i){

cart.splice(i,1)

renderCart()

}

function showInvoice(){

if(cart.length==0){

alert("السلة فارغة")
return

}

let html=`

<h3 class="font-bold mb-2">فاتورة البيع</h3>

<table class="w-full border text-center">

<thead class="bg-gray-200">

<tr>

<th>المنتج</th>
<th>السعر</th>
<th>الكمية</th>
<th>المجموع</th>

</tr>

</thead>

<tbody>

`

cart.forEach(i=>{

html+=`

<tr>

<td>${i.name}</td>
<td>${i.price}</td>
<td>${i.qty}</td>
<td>${i.total}</td>

</tr>

`

})

html+=`</tbody></table>`

html+=`<br><strong>الإجمالي: ${document.getElementById("total").innerText}</strong>`

const box=document.getElementById("invoiceBox")

box.innerHTML=html
box.classList.remove("hidden")

}

async function saveSale(){

if(cart.length==0){

alert("السلة فارغة")
return

}

const customer=document.getElementById("customer").value
const pay_method=document.getElementById("pay_method").value

const {data,error} = await supabase
.from("orders_o")
.insert([{

customer_id:customer,
date_order:new Date(),
pay_method:pay_method,
seal_man:"POS"

}])
.select()

if(error){

alert("خطأ في حفظ الفاتورة")
console.log(error)
return

}

const orderId=data[0].id_order

for(let item of cart){

await supabase
.from("orders_details")
.insert([{

id_product:item.id_product,
id_order:orderId,
qte:item.qty,
price:item.price,
amount:item.total,
total_amount:item.total,
id_customer:customer,
date_order:new Date(),
pay_method:pay_method,
seal_man:"POS"

}])

const {data:prod} = await supabase
.from("products")
.select("qte_in_stock")
.eq("id_product",item.id_product)
.single()

const newStock = Number(prod.qte_in_stock) - Number(item.qty)

await supabase
.from("products")
.update({qte_in_stock:newStock})
.eq("id_product",item.id_product)

}

alert("تمت عملية البيع")

cart=[]
renderCart()

loadProducts()

}

loadCustomers()
loadProducts()

</script>

</body>
</html>
```
