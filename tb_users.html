<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<title>إدارة المستخدمين</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable"></script>

<style>

body{
font-family:Arial;
padding:30px;
background:#f4f4f4;
}

input,select{
padding:7px;
margin:4px;
}

button{
padding:7px 12px;
cursor:pointer;
}

table{
border-collapse:collapse;
width:100%;
background:white;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#eee;
}

</style>

</head>

<body>

<h2 class="text-center text-3xl font-bold mb-6">إدارة المستخدمين</h2>

<h3 class="text-right text-xl font-semibold mb-4">إضافة مستخدم</h3>

<input id="username" placeholder="اسم المستخدم">
<input id="pwd" placeholder="كلمة المرور">
<input id="fullname" placeholder="الاسم الكامل">

<select id="usertype">

<option value="مدير">مدير</option>
<option value="تقني IT">تقني IT</option>
<option value="مشرف">مشرف</option>
<option value="بائع">بائع</option>


</select>

<button onclick="addUser()">إضافة</button>

<p id="msg"></p>

<hr>

<input id="search" placeholder="بحث..." onkeyup="searchUsers()">

<button onclick="exportExcel()">Excel</button>
<button onclick="exportPDF()">PDF</button>

<table>

<thead>

<tr>

<th>ID</th>
<th>اسم المستخدم</th>
<th>كلمة المرور</th>
<th>نوع المستخدم</th>
<th>الاسم الكامل</th>
<th>تعديل</th>
<th>حذف</th>

</tr>

</thead>

<tbody id="usersTable"></tbody>

</table>

<script>

const supabaseUrl="https://vmxbedovoahuggfpcmyk.supabase.co";
const supabaseKey="sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU";

const client=window.supabase.createClient(supabaseUrl,supabaseKey);

let users=[];

loadUsers();

async function loadUsers(){

const {data}=await client
.from("tb_users")
.select("*")
.order("id",{ascending:true});

users=data;

drawTable(users);

}

function drawTable(data){

let table="";

data.forEach(user=>{

table+=`

<tr>

<td>${user.id}</td>

<td contenteditable="true" id="u${user.id}">${user.username}</td>

<td>
<input type="password" id="p${user.id}" value="${user.pwd}" style="border:none;text-align:center;width:100%;">
</td>



</select>
<td>

<select id="t${user.id}">

<option ${user.usertype=="مدير"?"selected":""}>مدير</option>
<option ${user.usertype=="تقني IT"?"selected":""}>تقني IT</option>
<option ${user.usertype=="مشرف"?"selected":""}>مشرف</option>
<option ${user.usertype=="بائع"?"selected":""}>بائع</option>
</td>

<td contenteditable="true" id="f${user.id}">${user.fullname}</td>

<td>

<button onclick="updateUser(${user.id})">حفظ</button>

</td>

<td>

<button onclick="deleteUser(${user.id})">حذف</button>

</td>

</tr>

`;

});

document.getElementById("usersTable").innerHTML=table;

}

async function addUser(){

let username=document.getElementById("username").value;
let pwd=document.getElementById("pwd").value;
let fullname=document.getElementById("fullname").value;
let usertype=document.getElementById("usertype").value;

const {error}=await client
.from("tb_users")
.insert([{
username,
pwd,
fullname,
usertype
}]);

if(error){

document.getElementById("msg").innerHTML=error.message;

}else{

document.getElementById("msg").innerHTML="تمت إضافة المستخدم";

loadUsers();

}

}

async function updateUser(id){

let username=document.getElementById("u"+id).innerText;
let pwd=document.getElementById("p"+id).innerText;
let fullname=document.getElementById("f"+id).innerText;
let usertype=document.getElementById("t"+id).value;

await client
.from("tb_users")
.update({
username,
pwd,
fullname,
usertype
})
.eq("id",id);

loadUsers();

}

async function deleteUser(id){

await client
.from("tb_users")
.delete()
.eq("id",id);

loadUsers();

}

function searchUsers(){

let key=document.getElementById("search").value.toLowerCase();

let filtered=users.filter(u=>

u.username.toLowerCase().includes(key) ||
u.fullname.toLowerCase().includes(key)

);

drawTable(filtered);

}

function exportExcel(){

let ws=XLSX.utils.json_to_sheet(users);

let wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"Users");

XLSX.writeFile(wb,"users.xlsx");

}

function exportPDF(){

let doc=new jspdf.jsPDF();

let rows=users.map(u=>[u.id,u.username,u.pwd,u.usertype,u.fullname]);

doc.autoTable({

head:[["ID","Username","Password","Type","Fullname"]],

body:rows

});

doc.save("users.pdf");

}

</script>

</body>

</html>
