<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>إضافة مستخدم</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;padding:30px}
input,select{padding:8px;margin:5px;width:200px}
button{padding:10px 20px}
</style>

</head>

<body>

<h2>إضافة مستخدم جديد</h2>

<input id="username" placeholder="اسم المستخدم"><br>

<input id="pwd" type="password" placeholder="كلمة المرور"><br>

<input id="fullname" placeholder="الاسم الكامل"><br>

<select id="usertype">
<option value="مدير">مدير</option>
<option value="تقني IT">تقني IT</option>
<option value="مشرف">مشرف</option>
<option value="بائع">بائع</option>
<option value="مستخدم عادي">مستخدم عادي</option>
</select>

<br><br>

<button onclick="createUser()">إنشاء مستخدم</button>

<p id="msg"></p>

<script>

const supabaseUrl = "https://vmxbedovoahuggfpcmyk.supabase.co";
const supabaseKey = "sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

async function createUser(){

let username = document.getElementById("username").value;
let pwd = document.getElementById("pwd").value;
let fullname = document.getElementById("fullname").value;
let usertype = document.getElementById("usertype").value;

const {data,error} = await supabase
.from("tb_users")
.insert([
{
username: username,
pwd: pwd,
fullname: fullname,
usertype: usertype
}
]);

if(error){

document.getElementById("msg").innerHTML = error.message;

}else{

document.getElementById("msg").innerHTML = "تم حفظ المستخدم بنجاح";

}

}

</script>

</body>
</html>
