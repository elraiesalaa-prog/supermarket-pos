<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>لوحة التحكم</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 p-6">

<div class="max-w-7xl mx-auto">

<h1 class="text-3xl font-bold text-center text-blue-700 mb-8">
لوحة التحكم
</h1>

<!-- الإحصائيات -->

<div class="grid grid-cols-4 gap-6 mb-8 text-center font-bold text-lg">

<div class="bg-blue-100 p-6 rounded shadow">

إجمالي القروض

<div id="totalLoans" class="text-2xl text-blue-800 mt-2">0</div>

</div>

<div class="bg-green-100 p-6 rounded shadow">

إجمالي المسدد

<div id="totalPaid" class="text-2xl text-green-800 mt-2">0</div>

</div>

<div class="bg-red-100 p-6 rounded shadow">

المتبقي

<div id="totalRemain" class="text-2xl text-red-700 mt-2">0</div>

</div>

<div class="bg-yellow-100 p-6 rounded shadow">

عدد العملاء

<div id="totalCustomers" class="text-2xl text-yellow-700 mt-2">0</div>

</div>

</div>

<!-- أزرار التنقل -->

<div class="grid grid-cols-4 gap-6 mb-8 text-center">

<a href="loans.html" class="bg-blue-600 text-white p-4 rounded shadow">
إدارة القروض
</a>

<a href="loan_statement.html" class="bg-green-600 text-white p-4 rounded shadow">
كشف حساب عميل
</a>

<a href="loans_report.html" class="bg-purple-600 text-white p-4 rounded shadow">
تقرير القروض
</a>

<button onclick="history.back()" class="bg-gray-600 text-white p-4 rounded shadow">
رجوع
</button>

</div>

<!-- آخر القروض -->

<div class="bg-white rounded shadow p-6">

<h2 class="text-xl font-bold text-blue-700 mb-4">

آخر القروض

</h2>

<table class="w-full border text-center">

<thead class="bg-blue-600 text-white">

<tr>

<th>رقم القرض</th>
<th>اسم العميل</th>
<th>القيمة</th>
<th>المسدد</th>
<th>المتبقي</th>
<th>التاريخ</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

<script>

const supabaseUrl="https://vmxbedovoahuggfpcmyk.supabase.co";
const supabaseKey="sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU";

const supabaseClient=supabase.createClient(supabaseUrl,supabaseKey);

async function loadDashboard(){

const {data,error}=await supabaseClient
.from("loans")
.select("*")
.order("loan_id",{ascending:false})
.limit(10);

if(error){

alert(error.message);

return;

}

let totalLoans=0;
let totalPaid=0;
let customers=new Set();

let table="";

data.forEach(r=>{

let remain=(r.loan_value||0)-(r.sadad||0);

totalLoans+=r.loan_value||0;

totalPaid+=r.sadad||0;

customers.add(r.c_name);

table+=`

<tr class="border">

<td>${r.loan_id}</td>

<td>${r.c_name||""}</td>

<td>${r.loan_value||0}</td>

<td>${r.sadad||0}</td>

<td class="text-red-600 font-bold">${remain}</td>

<td>${r.loan_date||""}</td>

</tr>

`;

});

document.getElementById("tableBody").innerHTML=table;

document.getElementById("totalLoans").innerText=totalLoans;

document.getElementById("totalPaid").innerText=totalPaid;

document.getElementById("totalRemain").innerText=totalLoans-totalPaid;

document.getElementById("totalCustomers").innerText=customers.size;

}

loadDashboard();

</script>

</body>
</html>
