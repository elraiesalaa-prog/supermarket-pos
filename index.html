<script>
const supabaseClient = window.supabase.createClient(
  "https://vmxbedovoahuggfpcmyk.supabase.co",
  "sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU"
)

async function login() {
  const username = document.getElementById("username").value.trim()
  const password = document.getElementById("password").value.trim()

  if (!username || !password) {
    alert("الرجاء إدخال اسم المستخدم وكلمة المرور")
    return
  }

  // البحث حسب العمود username وليس id
  const { data, error } = await supabaseClient
    .from("tb_users")
    .select("*")
    .eq("username", username)
    .eq("pwd", password)
    .single()

  console.log("Data:", data)
  console.log("Error:", error)

  if (error || !data) {
    alert("بيانات الدخول غير صحيحة")
    return
  }

  // حفظ بيانات المستخدم في localStorage
  localStorage.setItem("user", data.fullname)
  localStorage.setItem("role", data.usertype)

  // تحويل المستخدم حسب نوعه
  switch (data.usertype) {
    case "superuser":
      window.location = "superuser.html"
      break
    case "admin":
      window.location = "dashboard.html"
      break
    case "ituser":
      window.location = "ituser.html"
      break
    case "sealer":
      window.location = "sealer.html"
      break
    default:
      alert("نوع المستخدم غير معروف")
  }
}
</script>
