<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>تقرير الأرباح</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-blue-50 p-6">

<div class="max-w-5xl mx-auto bg-white shadow-xl rounded-xl p-6">

<h1 class="text-3xl font-bold text-center text-blue-700 mb-6">
تقرير الأرباح
</h1>

<!-- رقم الطلبية -->
<div class="mb-4">

<label class="font-bold">رقم الطلبية</label>

<input id="req_id"
type="text"
class="w-full border p-2 rounded"
placeholder="ادخل رقم الطلبية">

</div>

<div class="flex gap-3 mb-6">

<button onclick="calcOrderProfit()"
class="bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded">

حساب أرباح الطلبية

</button>

<button onclick="calcTotalProfit()"
class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded">

الأرباح الكلية

</button>

</div>

<!-- النتائج -->

<div class="grid grid-cols-2 gap-4 mb-6">

<div class="bg-green-100 p-4 rounded text-center">

<h2 class="font-bold text-lg">أرباح الطلبية</h2>

<p id="orderProfit" class="text-2xl font-bold text-green-700">0</p>

</div>

<div class="bg-blue-100 p-4 rounded text-center">

<h2 class="font-bold text-lg">الأرباح الكلية</h2>

<p id="totalProfit" class="text-2xl font-bold text-blue-700">0</p>

</div>

</div>

<!-- جدول تفاصيل الطلبية -->

<div class="overflow-auto">

<table class="w-full border text-center">

<thead class="bg-blue-600 text-white">

<tr>

<th class="p-2">اسم المنتج</th>
<th class="p-2">ربح المنتج</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<!-- الأزرار -->

<div class="mt-6 flex gap-3 justify-center">

<a href="products.html"
class="bg-yellow-500 hover:bg-yellow-600 text-white px-5 py-2 rounded">

تعديل المنتجات

</a>

<a href="index.html"
class="bg-gray-600 hover:bg-gray-700 text-white px-5 py-2 rounded">

رجوع

</a>

</div>

</div>

<script>

const supabaseUrl="https://vmxbedovoahuggfpcmyk.supabase.co";
const supabaseKey="sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU";

const supabaseClient=supabase.createClient(
supabaseUrl,
supabaseKey
);

let data=[];

async function loadData(){

const {data:report,error}=await supabaseClient
.from("products_report")
.select("*");

if(error){
alert(error.message);
return;
}

data=report;

}

async function calcOrderProfit(){

const req=document.getElementById("req_id").value;

if(!req){
alert("ادخل رقم الطلبية");
return;
}

const filtered=data.filter(r=>r.req_id==req);

let profit=0;

let table="";

filtered.forEach(row=>{

profit+=Number(row["ربح المنتج"]);

table+=`
<tr class="border">

<td>${row["اسم المنتج"]}</td>

<td>${Number(row["ربح المنتج"]).toFixed(2)}</td>

</tr>
`;

});

document.getElementById("tableBody").innerHTML=table;

document.getElementById("orderProfit").textContent=
profit.toFixed(2);

}

function calcTotalProfit(){

let total=0;

data.forEach(row=>{

total+=Number(row["ربح المنتج"]);

});

document.getElementById("totalProfit").textContent=
total.toFixed(2);

}

loadData();

</script>

</body>
</html>
