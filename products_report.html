<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل المنتجات</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-blue-50 p-3 md:p-6">

<div class="max-w-7xl mx-auto bg-white shadow-xl rounded-xl p-4 md:p-6">

<h1 class="text-xl md:text-3xl font-bold text-center text-blue-700 mb-4 md:mb-6">
تفاصيل المنتجات
</h1>

<!-- زر الطباعة -->
<div class="mb-4 flex justify-start">
<button onclick="printPDF()" 
class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 md:px-5 md:py-2 rounded-lg shadow-md w-full md:w-auto">
🖨️ طباعة PDF
</button>
</div>

<!-- البحث -->
<div class="mb-4">
<input id="searchInput" type="text"
placeholder="بحث باسم المنتج..."
class="w-full border px-3 py-2 rounded text-sm md:text-base">
</div>

<!-- الجدول -->
<div class="overflow-x-auto">
<table class="min-w-[800px] w-full border text-center text-sm md:text-base">

<thead class="bg-blue-600 text-white">
<tr>
<th class="p-2">اسم المنتج</th>
<th class="p-2">عدد القطع</th>
<th class="p-2">كمية الشراء</th>
<th class="p-2">تكلفة المنتج</th>
<th class="p-2">تكلفة الوحدة</th>
<th class="p-2">سعر البيع</th>
<th class="p-2">ربح الوحدة</th>
<th class="p-2">ربح المنتج</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>
</div>

</div>

<script>

// ================== Supabase ==================
const supabaseUrl = "https://vmxbedovoahuggfpcmyk.supabase.co";
const supabaseKey = "sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let reportData = [];

// تحميل البيانات
async function loadReport() {

const { data, error } = await supabaseClient
.from("products_report")
.select("*");

if (error) {
console.error(error);
alert("خطأ: " + error.message);
return;
}

reportData = data;
renderTable();

}

// عرض البيانات
function renderTable() {

const search = document.getElementById("searchInput").value.toLowerCase();

let table = "";

reportData
.filter(row =>
(row["اسم المنتج"] || "").toLowerCase().includes(search)
)
.forEach(row => {

table += `
<tr class="border">
<td>${row["اسم المنتج"]}</td>
<td>${row["عدد القطع"]}</td>
<td>${row["كمية الشراء"]}</td>
<td>${row["تكلفة المنتج"]}</td>
<td>${Number(row["تكلفة الوحدة"] || 0).toFixed(2)}</td>
<td>${row["سعر بيع الوحدة"]}</td>
<td>${Number(row["ربح الوحدة"] || 0).toFixed(2)}</td>
<td class="font-bold text-green-600">
${Number(row["ربح المنتج"] || 0).toFixed(2)}
</td>
</tr>
`;

});

document.getElementById("tableBody").innerHTML = table;

}

// البحث
document.getElementById("searchInput")
.addEventListener("input", renderTable);

// تشغيل
loadReport();

// ================== PDF ==================
window.printPDF = async function () {

const { data, error } = await supabaseClient
.from('products_report')
.select('*');

if (error) {
alert("خطأ في تحميل البيانات");
return;
}

const container = document.createElement("div");
container.setAttribute("dir", "rtl");
container.style.fontFamily = "Tahoma";
container.style.padding = "10px";

const title = document.createElement("h2");
title.innerText = "تقرير المنتجات";
title.style.textAlign = "center";
title.style.marginBottom = "15px";
container.appendChild(title);

const table = document.createElement("table");
table.style.width = "100%";
table.style.borderCollapse = "collapse";
table.style.textAlign = "center";
table.style.fontSize = "12px";

const headers = [
"اسم المنتج","عدد القطع","كمية الشراء","تكلفة المنتج",
"تكلفة الوحدة","سعر بيع الوحدة","ربح الوحدة","ربح المنتج"
];

let html = "<thead><tr>";

headers.forEach(h => {
html += `
<th style="border:1px solid #000;padding:6px;background:#007bff;color:#fff;">
${h}
</th>`;
});

html += "</tr></thead><tbody>";

data.forEach(r => {
html += `
<tr>
<td style="border:1px solid #000;padding:5px;">${r["اسم المنتج"]}</td>
<td style="border:1px solid #000;padding:5px;">${r["عدد القطع"]}</td>
<td style="border:1px solid #000;padding:5px;">${r["كمية الشراء"]}</td>
<td style="border:1px solid #000;padding:5px;">${r["تكلفة المنتج"]}</td>
<td style="border:1px solid #000;padding:5px;">${Number(r["تكلفة الوحدة"] || 0).toFixed(2)}</td>
<td style="border:1px solid #000;padding:5px;">${r["سعر بيع الوحدة"]}</td>
<td style="border:1px solid #000;padding:5px;">${Number(r["ربح الوحدة"] || 0).toFixed(2)}</td>
<td style="border:1px solid #000;padding:5px;color:green;font-weight:bold;">
${Number(r["ربح المنتج"] || 0).toFixed(2)}
</td>
</tr>
`;
});

html += "</tbody>";
table.innerHTML = html;
container.appendChild(table);

let total = data.reduce((sum, r) => sum + Number(r["ربح المنتج"] || 0), 0);

const totalDiv = document.createElement("div");
totalDiv.innerText = "إجمالي الأرباح: " + total.toFixed(2);
totalDiv.style.textAlign = "right";
totalDiv.style.marginTop = "15px";
totalDiv.style.fontWeight = "bold";

container.appendChild(totalDiv);

html2pdf().set({
margin: 0.5,
filename: "تقرير_المنتجات.pdf",
image: { type: "jpeg", quality: 1 },
html2canvas: { scale: 3 },
jsPDF: { unit: "cm", format: "a4", orientation: "landscape" }
}).from(container).save();

};

</script>

</body>
</html>
