<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<title>تفاصيل المنتجات</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-blue-50 p-6">

<div class="max-w-7xl mx-auto bg-white shadow-xl rounded-xl p-6">

<h1 class="text-3xl font-bold text-center text-blue-700 mb-6">
تفاصيل المنتجات
</h1>

<!-- 🔹 زر الطباعة -->
<div class="mb-4 text-left">
<button onclick="printPDF()" 
class="bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded-lg shadow-md">
🖨️ طباعة PDF
</button>
</div>

<div class="mb-4">
<input id="searchInput" type="text"
placeholder="بحث باسم المنتج..."
class="w-full border px-3 py-2 rounded">
</div>

<div class="overflow-auto">

<table class="w-full border text-center">

<thead class="bg-blue-600 text-white">
<tr>
<th class="p-2">اسم المنتج</th>
<th class="p-2">عدد القطع</th>
<th class="p-2">كمية الشراء</th>
<th class="p-2">تكلفة المنتج</th>
<th class="p-2">تكلفة الوحدة</th>
<th class="p-2">سعر البيع</th>
<th class="p-2">ربح الوحدة</th>
<th class="p-2">ربح المنتج</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

<script>

const supabaseUrl = "https://vmxbedovoahuggfpcmyk.supabase.co";
const supabaseKey = "sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let reportData = [];

async function loadReport() {

const { data, error } = await supabaseClient
.from("products_report")
.select("*");

if (error) {
console.error(error);
alert("خطأ: " + error.message);
return;
}

reportData = data;
renderTable();

}

function renderTable() {

const search = document.getElementById("searchInput").value.toLowerCase();

let table = "";

reportData
.filter(row =>
(row["اسم المنتج"] || "").toLowerCase().includes(search)
)
.forEach(row => {

table += `
<tr class="border">
<td>${row["اسم المنتج"]}</td>
<td>${row["عدد القطع"]}</td>
<td>${row["كمية الشراء"]}</td>
<td>${row["تكلفة المنتج"]}</td>
<td>${Number(row["تكلفة الوحدة"] || 0).toFixed(2)}</td>
<td>${row["سعر بيع الوحدة"]}</td>
<td>${Number(row["ربح الوحدة"] || 0).toFixed(2)}</td>
<td class="font-bold text-green-600">
${Number(row["ربح المنتج"] || 0).toFixed(2)}
</td>
</tr>
`;

});

document.getElementById("tableBody").innerHTML = table;

}

document.getElementById("searchInput")
.addEventListener("input", renderTable);

// 🔹 تشغيل التحميل
loadReport();


// ================== PDF ==================
window.printPDF = async function () {

const { data, error } = await supabaseClient
.from('products_report')
.select('*');

if (error) {
alert("خطأ في تحميل البيانات");
return;
}

const container = document.createElement("div");
container.setAttribute("dir", "rtl");
container.style.fontFamily = "Tahoma";

const title = document.createElement("h2");
title.innerText = "تقرير المنتجات";
title.style.textAlign = "center";
container.appendChild(title);

const table = document.createElement("table");
table.style.width = "100%";
table.style.borderCollapse = "collapse";

const headers = [
"اسم المنتج","عدد القطع","كمية الشراء","تكلفة المنتج",
"تكلفة الوحدة","سعر بيع الوحدة","ربح الوحدة","ربح المنتج"
];

let html = "<tr>";
headers.forEach(h => html += `<th style="border:1px solid #000">${h}</th>`);
html += "</tr>";

data.forEach(r => {
html += `<tr>
<td>${r["اسم المنتج"]}</td>
<td>${r["عدد القطع"]}</td>
<td>${r["كمية الشراء"]}</td>
<td>${r["تكلفة المنتج"]}</td>
<td>${Number(r["تكلفة الوحدة"] || 0).toFixed(2)}</td>
<td>${r["سعر بيع الوحدة"]}</td>
<td>${Number(r["ربح الوحدة"] || 0).toFixed(2)}</td>
<td>${Number(r["ربح المنتج"] || 0).toFixed(2)}</td>
</tr>`;
});

table.innerHTML = html;
container.appendChild(table);

html2pdf().from(container).save("تقرير_المنتجات.pdf");

};

</script>

</body>
</html>
