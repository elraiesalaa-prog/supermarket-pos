<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<title> تفاصيل المنتجات</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-blue-50 p-6">

<div class="max-w-7xl mx-auto bg-white shadow-xl rounded-xl p-6">

<h1 class="text-3xl font-bold text-center text-blue-700 mb-6">
 تفاصيل المنتجات
</h1>

<div class="mb-4">
<input id="searchInput" type="text"
placeholder="بحث باسم المنتج..."
class="w-full border px-3 py-2 rounded">
</div>

<div class="overflow-auto">

<table class="w-full border text-center">

<thead class="bg-blue-600 text-white">

<tr>

<th class="p-2">اسم المنتج</th>
<th class="p-2">عدد القطع</th>
<th class="p-2">كمية الشراء</th>
<th class="p-2">تكلفة المنتج</th>
<th class="p-2">تكلفة الوحدة</th>
<th class="p-2">سعر البيع</th>
<th class="p-2">ربح الوحدة</th>
<th class="p-2">ربح المنتج</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<div class="mt-6 text-center">
<a href="index.html"
class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded">
رجوع
</a>
</div>

</div>

<script>

const supabaseUrl = "https://vmxbedovoahuggfpcmyk.supabase.co";
const supabaseKey = "sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU";

const supabaseClient = supabase.createClient(
supabaseUrl,
supabaseKey
);

let reportData = [];

async function loadReport(){

const { data, error } = await supabaseClient
.from("products_report")
.select("*");

if(error){
alert(error.message);
return;
}

reportData = data;
renderTable();

}

function renderTable(){

const search = document
.getElementById("searchInput")
.value
.toLowerCase();

let table = "";

reportData
.filter(row =>
(row["اسم المنتج"] || "")
.toLowerCase()
.includes(search)
)
.forEach(row => {

table += `
<tr class="border">

<td>${row["اسم المنتج"]}</td>

<td>${row["عدد القطع"]}</td>

<td>${row["كمية الشراء"]}</td>

<td>${row["تكلفة المنتج"]}</td>

<td>${Number(row["تكلفة الوحدة"]).toFixed(2)}</td>

<td>${row["سعر بيع الوحدة"]}</td>

<td>${Number(row["ربح الوحدة"]).toFixed(2)}</td>

<td class="font-bold text-green-600">
${Number(row["ربح المنتج"]).toFixed(2)}
</td>
<button onclick="printPDF()" 
  class="bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded-lg shadow-md">
  🖨️ طباعة تقرير المنتجات PDF
</button>
</tr>
`;

});

document.getElementById("tableBody").innerHTML = table;

}

document
.getElementById("searchInput")
.addEventListener("input",renderTable);

loadReport();
<script>
window.printPDF = async function () {

  // 🔹 جلب البيانات من View
  const { data, error } = await supabase
    .from('products_report')
    .select('*');

  if (error) {
    console.error(error);
    alert("خطأ في تحميل البيانات");
    return;
  }

  if (!data || data.length === 0) {
    alert("لا توجد بيانات للطباعة");
    return;
  }

  // 🔹 إنشاء جدول HTML ديناميكي
  const container = document.createElement("div");
  container.setAttribute("dir", "rtl");
  container.style.fontFamily = "Tahoma, Arial, sans-serif";
  container.style.padding = "10px";

  // 🔹 عنوان
  const title = document.createElement("h2");
  title.innerText = "تقرير المنتجات";
  title.style.textAlign = "center";
  container.appendChild(title);

  // 🔹 إنشاء الجدول
  const table = document.createElement("table");
  table.style.width = "100%";
  table.style.borderCollapse = "collapse";
  table.style.textAlign = "center";

  // 🔹 رأس الجدول
  const headers = [
    "اسم المنتج",
    "عدد القطع",
    "كمية الشراء",
    "تكلفة المنتج",
    "تكلفة الوحدة",
    "سعر بيع الوحدة",
    "ربح الوحدة",
    "ربح المنتج"
  ];

  const thead = document.createElement("thead");
  const trHead = document.createElement("tr");

  headers.forEach(h => {
    const th = document.createElement("th");
    th.innerText = h;
    th.style.border = "1px solid #000";
    th.style.padding = "5px";
    th.style.background = "#eee";
    trHead.appendChild(th);
  });

  thead.appendChild(trHead);
  table.appendChild(thead);

  // 🔹 جسم الجدول
  const tbody = document.createElement("tbody");

  let totalProfit = 0;

  data.forEach(item => {
    const tr = document.createElement("tr");

    const row = [
      item["اسم المنتج"],
      item["عدد القطع"],
      item["كمية الشراء"],
      item["تكلفة المنتج"],
      item["تكلفة الوحدة"],
      item["سعر بيع الوحدة"],
      item["ربح الوحدة"],
      item["ربح المنتج"]
    ];

    totalProfit += Number(item["ربح المنتج"] || 0);

    row.forEach(val => {
      const td = document.createElement("td");
      td.innerText = val;
      td.style.border = "1px solid #000";
      td.style.padding = "5px";
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  container.appendChild(table);

  // 🔹 الإجمالي
  const totalDiv = document.createElement("div");
  totalDiv.innerText = "إجمالي الأرباح: " + totalProfit;
  totalDiv.style.textAlign = "right";
  totalDiv.style.marginTop = "15px";
  totalDiv.style.fontWeight = "bold";

  container.appendChild(totalDiv);

  // 🔹 إعدادات PDF
  const opt = {
    margin: 0.5,
    filename: "تقرير_المنتجات.pdf",
    image: { type: "jpeg", quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: "cm", format: "a4", orientation: "landscape" } // أفضل للجدول
  };

  // 🔹 إنشاء PDF
  html2pdf().set(opt).from(container).save();
};
</script>
</script>

</body>
</html>
