</div>

<script>
  function openSettings(){
window.location="settings.html";
}
  function loadStore(){

let name = localStorage.getItem("storeName");
let header = localStorage.getItem("storeHeader");

if(!name){
name="ABM للتجارة والاستثمار";
localStorage.setItem("storeName",name);
}

if(!header){
header="نظام إدارة االمبيعات";
localStorage.setItem("storeHeader",header);
}

document.getElementById("storeName").innerText=name;
document.getElementById("storeHeader").innerText=header;

}

loadStore();
  function editPassword(){
  let newPwd = prompt("أدخل كلمة المرور الجديدة:");
  if(newPwd){
    // نفترض أن المستخدم الحالي مخزن في localStorage باسم "currentUser"
    let currentUser = localStorage.getItem("currentUser");
    if(!currentUser){ alert("لا يوجد مستخدم مسجل!"); return; }

    // تحديث كلمة المرور في جدول tb_users
    supabase.from('tb_users')
      .update({pwd:newPwd})
      .eq('id',currentUser)
      .then(({error})=>{
        if(error){ alert("خطأ: "+error.message); return;}
        alert("تم تعديل كلمة المرور بنجاح");
      });
  }
}
function updateClock(){

let now = new Date();

let time = now.toLocaleTimeString();
let date = now.toLocaleDateString();

document.getElementById("clock").innerHTML =
"🕒 " + time + " | " + date;

}

setInterval(updateClock,1000);
updateClock();
function loadUser(){

let user = localStorage.getItem("username");

if(!user){

user = " بائع ";

localStorage.setItem("username",user);

}

document.getElementById("usernameDisplay").innerText = user;

}


function editUser(){

let newName = prompt("اكتب اسم المستخدم الجديد");

if(newName){

localStorage.setItem("username",newName);

loadUser();

}

}


function logout(){

localStorage.removeItem("username");

window.location="index.html";

}


loadUser();

</script>
<script>

document.addEventListener("DOMContentLoaded", function(){

let user = localStorage.getItem("user")

if(!user){
window.location="index.html"
return
}

document.getElementById("usernameDisplay").textContent = user

})

</script>
</body>
