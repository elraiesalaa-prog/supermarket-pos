<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام POS متقدم v3</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="Cairo-Regular.js"></script>
</head>

<body class="bg-gray-100 p-3 md:p-6">

<div class="max-w-7xl mx-auto">
  <h1 class="text-2xl md:text-3xl font-bold text-center mb-6">نظام POS متقدم v3</h1>

  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 md:gap-6">

    <!-- العملاء -->
    <div class="bg-white p-4 rounded shadow">
      <h2 class="font-bold mb-3">العميل</h2>
      <select id="customer" class="border p-2 w-full mb-3"></select>
      <select id="pay_method" class="border p-2 w-full mb-3">
        <option value="cash">نقد</option>
        <option value="bank">تحويل</option>
        <option value="later">آجل</option>
      </select>
      <input id="seal_man" class="border p-2 w-full" readonly />
    </div>

    <!-- المنتجات -->
    <div class="bg-white p-4 rounded shadow">
      <h2 class="font-bold mb-3">المنتجات</h2>
      <select id="product" class="border p-2 w-full mb-3"></select>
      <div class="flex flex-col sm:flex-row gap-2 mb-3">
        <input id="price" class="border p-2 w-full" readonly />
        <input id="stock" class="border p-2 w-full" readonly />
      </div>
      <input id="qte" type="number" placeholder="الكمية" class="border p-2 w-full mb-3">
      <button onclick="addItem()" class="bg-blue-600 text-white w-full py-2 rounded">
        إضافة للسلة
      </button>
    </div>

    <!-- الإجمالي -->
    <div class="bg-white p-4 rounded shadow">
      <h2 class="font-bold mb-3">الإجمالي</h2>
      <div class="text-xl font-bold mb-4">
        الإجمالي : <span id="total">0</span>
      </div>
      <div class="flex flex-col gap-2">
        <button onclick="showInvoiceModal()" class="bg-yellow-600 text-white w-full py-2 rounded">
          عرض الفاتورة
        </button>
        <button id="saveBtn" onclick="saveInvoice()" class="bg-green-600 text-white w-full py-2 rounded">
          إتمام البيع
        </button>
      </div>
    </div>

  </div>

  <!-- السلة -->
  <div class="bg-white mt-6 p-4 rounded shadow overflow-x-auto">
    <table class="w-full text-center min-w-[500px]">
      <thead class="bg-gray-200">
        <tr>
          <th>المنتج</th>
          <th>السعر</th>
          <th>الكمية</th>
          <th>المجموع</th>
          <th>حذف</th>
        </tr>
      </thead>
      <tbody id="cart"></tbody>
    </table>
  </div>

</div>

<!-- نافذة الفاتورة -->
<div id="invoiceModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
  <div class="bg-white p-4 md:p-6 rounded shadow w-11/12 sm:w-3/4 max-w-3xl overflow-auto">
    <h2 class="text-xl font-bold mb-4 text-center">فاتورة البيع</h2>

    <div class="overflow-x-auto">
      <table class="w-full text-center border min-w-[400px]">
        <thead class="bg-gray-200">
          <tr>
            <th class="border p-2">المنتج</th>
            <th class="border p-2">السعر</th>
            <th class="border p-2">الكمية</th>
            <th class="border p-2">المجموع</th>
          </tr>
        </thead>
        <tbody id="invoiceTable"></tbody>
      </table>
    </div>

    <div class="text-xl font-bold mt-4 text-left">
      الإجمالي : <span id="invoiceTotal">0</span>
    </div>

    <div class="flex flex-col sm:flex-row justify-center gap-4 mt-4">
      <button onclick="printPDF()" class="bg-blue-600 text-white px-4 py-2 rounded w-full sm:w-auto">
        طباعة PDF
      </button>
      <button onclick="closeInvoice()" class="bg-red-600 text-white px-4 py-2 rounded w-full sm:w-auto">
        إغلاق
      </button>
    </div>
  </div>
</div>

<script>
/* كل وظائف الصفحة كما هي مع Supabase وجافاسكريبت */
</script>

</body>
</html>
