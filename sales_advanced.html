<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام POS متقدم v3</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-gray-100 p-6">

<div class="max-w-7xl mx-auto">
<h1 class="text-3xl font-bold text-center mb-6">نظام POS متقدم v3</h1>

<div class="grid grid-cols-3 gap-6">

<!-- العملاء -->
<div class="bg-white p-4 rounded shadow">
<h2 class="font-bold mb-3">العميل</h2>
<select id="customer" class="border p-2 w-full mb-3"></select>

<select id="pay_method" class="border p-2 w-full mb-3">
<option value="cash">نقد</option>
<option value="bank">تحويل</option>
<option value="later">آجل</option>
</select>

<input id="seal_man" class="border p-2 w-full" readonly/>
</div>

<!-- المنتجات -->
<div class="bg-white p-4 rounded shadow">
<h2 class="font-bold mb-3">المنتجات</h2>
<select id="product" class="border p-2 w-full mb-3"></select>

<div class="flex gap-2 mb-3">
<input id="price" placeholder="سعر البيع" class="border p-2 w-full" readonly/>
<input id="stock" placeholder="المخزون" class="border p-2 w-full" readonly/>
</div>

<input id="qte" type="number" placeholder="الكمية" class="border p-2 w-full mb-3"/>
<button onclick="addItem()" class="bg-blue-600 text-white w-full py-2 rounded">إضافة للسلة</button>
</div>

<!-- الإجمالي -->
<div class="bg-white p-4 rounded shadow">
<h2 class="font-bold mb-3">الإجمالي</h2>
<div class="text-xl font-bold mb-4">
الإجمالي : <span id="total">0</span>
</div>
<div class="flex flex-col gap-2">
<button onclick="showInvoiceModal()" class="bg-yellow-600 text-white w-full py-2 rounded">عرض الفاتورة</button>
<button onclick="saveInvoice()" class="bg-green-600 text-white w-full py-2 rounded">إتمام البيع</button>
</div>
</div>

</div>

<!-- سلة المشتريات -->
<div class="bg-white mt-6 p-4 rounded shadow">
<table class="w-full text-center">
<thead class="bg-gray-200">
<tr>
<th>المنتج</th>
<th>السعر</th>
<th>الكمية</th>
<th>المجموع</th>
<th>تعديل</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="cart"></tbody>
</table>
</div>

<!-- نافذة عرض الفاتورة -->
<div id="invoiceModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden">
<div class="bg-white p-6 rounded w-96 relative max-h-[80vh] overflow-y-auto">
<h2 class="text-xl font-bold mb-3 text-center">فاتورة البيع</h2>
<div id="invoiceContent" class="text-right text-sm mb-4"></div>
<div class="flex justify-end gap-2">
<button onclick="printInvoice()" class="bg-blue-600 text-white px-3 py-1 rounded">طباعة</button>
<button onclick="closeInvoiceModal()" class="bg-gray-400 text-white px-3 py-1 rounded">إغلاق</button>
</div>
</div>
</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

const supabase = window.supabase.createClient(
  "https://vmxbedovoahuggfpcmyk.supabase.co",
  "sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU"
);

const currentUserName = "Alaadin Adam";
document.getElementById("seal_man").value = currentUserName;

let products = [];
let cart = [];

// تحميل العملاء
async function loadCustomers() {
  const select = document.getElementById("customer");
  select.innerHTML = "";
  const { data, error } = await supabase.from("customers").select("id_customer,first_name");
  if(error){ console.log(error); alert("خطأ في تحميل العملاء"); return; }
  data.forEach(c=>{
    const option=document.createElement("option");
    option.value=c.id_customer;
    option.textContent=c.first_name;
    select.appendChild(option);
  });
}

// تحميل المنتجات
async function loadProducts() {
  const select = document.getElementById("product");
  select.innerHTML = "";
  const { data, error } = await supabase.from("products").select("id_product,product_name,seal_price,qte_in_stock");
  if(error){ console.log(error); alert("خطأ في تحميل المنتجات"); return; }
  products = data;
  data.forEach(p=>{
    const option=document.createElement("option");
    option.value=p.id_product;
    option.textContent=p.product_name;
    select.appendChild(option);
  });
  select.addEventListener("change", showProduct);
  showProduct();
}

// عرض سعر ومخزون المنتج
function showProduct(){
  const id=document.getElementById("product").value;
  const p=products.find(x=>x.id_product==id);
  if(!p) return;
  document.getElementById("price").value=p.seal_price;
  document.getElementById("stock").value=p.qte_in_stock;
}

// عرض السلة
function renderCart(){
  const table=document.getElementById("cart");
  table.innerHTML="";
  let total=0;
  cart.forEach((i,index)=>{
    total+=i.total;
    table.innerHTML+=`
    <tr class="border-b">
      <td>${i.name}</td>
      <td>${i.price}</td>
      <td><input type="number" value="${i.qte}" min="1" style="width:60px" onchange="updateQty(${index},this.value)"/></td>
      <td>${i.total}</td>
      <td><button onclick="updateQty(${index},document.querySelectorAll('#cart input')[${index}].value)" class="text-blue-600">تحديث</button></td>
      <td><button onclick="removeItem(${index})" class="text-red-600">حذف</button></td>
    </tr>`;
  });
  document.getElementById("total").innerText=total;
}

// إضافة منتج للسلة
window.addItem = function(){
  const productId = document.getElementById("product").value;
  const qte = parseFloat(document.getElementById("qte").value);
  const product = products.find(p=>p.id_product==productId);
  if(!qte||qte<=0){ alert("ادخل الكمية"); return; }
  if(qte>product.qte_in_stock){ alert("الكمية أكبر من المخزون"); return; }

  product.qte_in_stock -= qte; // تحديث المخزون محلياً
  cart.push({id_product:productId,name:product.product_name,price:product.seal_price,qte:qte,total:qte*product.seal_price});
  renderCart();
  showProduct();
}

// تعديل كمية المنتج في السلة
window.updateQty = function(index,value){
  const q=parseFloat(value);
  const product=products.find(p=>p.id_product==cart[index].id_product);
  const delta = q - cart[index].qte;
  if(delta > product.qte_in_stock){ alert("الكمية أكبر من المخزون"); return; }
  product.qte_in_stock -= delta;
  cart[index].qte=q;
  cart[index].total=q*cart[index].price;
  renderCart();
  showProduct();
}

// حذف المنتج من السلة
window.removeItem = function(index){
  const product=products.find(p=>p.id_product==cart[index].id_product);
  product.qte_in_stock += cart[index].qte;
  cart.splice(index,1);
  renderCart();
  showProduct();
}

// عرض الفاتورة
window.showInvoiceModal = function(){
  if(cart.length===0){ alert("السلة فارغة"); return; }
  const container=document.getElementById("invoiceContent");
  container.innerHTML=`<table class="w-full text-right border-collapse border border-gray-400">
  <thead class="bg-gray-200"><tr><th class="border p-1">المنتج</th><th class="border p-1">السعر</th><th class="border p-1">الكمية</th><th class="border p-1">المجموع</th></tr></thead><tbody>`;
  cart.forEach(i=>{ container.innerHTML+=`<tr><td class="border p-1">${i.name}</td><td class="border p-1">${i.price}</td><td class="border p-1">${i.qte}</td><td class="border p-1">${i.total}</td></tr>`; });
  container.innerHTML+=`</tbody></table><p class="mt-2"><strong>الإجمالي:</strong> ${document.getElementById("total").innerText}</p>`;
  container.innerHTML+=`<p><strong>العميل:</strong> ${document.getElementById("customer").selectedOptions[0].text} <br> <strong>البائع:</strong> ${document.getElementById("seal_man").value} <br> <strong>طريقة الدفع:</strong> ${document.getElementById("pay_method").value}</p>`;
  document.getElementById("invoiceModal").classList.remove("hidden");
}

// إغلاق نافذة الفاتورة
window.closeInvoiceModal = function(){
  document.getElementById("invoiceModal").classList.add("hidden");
}

// طباعة الفاتورة
window.printInvoice = function(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({orientation:"p",unit:"mm",format:"a4"});
  doc.setFontSize(14);
  doc.text("فاتورة المبيعات",105,10,null,null,"center");
  let y=20;
  cart.forEach(i=>{
    doc.text(`${i.name} - ${i.qte} × ${i.price} = ${i.total}`,10,y);
    y+=7;
  });
  doc.text(`الإجمالي: ${document.getElementById("total").innerText}`,10,y+5);
  doc.save("invoice.pdf");
  closeInvoiceModal();
}

// حفظ الفاتورة باستخدام الإجراء المخزن
window.saveInvoice = async function(){
  if(cart.length===0){ alert("السلة فارغة"); return; }
  const customer=document.getElementById("customer").value;
  const pay_method=document.getElementById("pay_method").value;
  const seal_man=document.getElementById("seal_man").value;

  // إنشاء الطلب الرئيسي
  const { data, error } = await supabase.from("orders_o").insert([{
    customer_id:customer,
    date_order:new Date(),
    pay_method:pay_method,
    seal_man:seal_man
  }]).select();

  if(error){ alert("خطأ في حفظ الفاتورة"); console.log(error); return; }

  const orderId=data[0].id_order;

  // إدخال كل عنصر باستخدام الإجراء المخزن
  for(let item of cart){
    const { error: rpcError } = await supabase.rpc('add_orders_details', {
      p_id_product: item.id_product,
      p_id_order: orderId,
      p_qte: item.qte,
      p_price: item.price,
      p_descount: 0,
      p_amount: item.total,
      p_total_amount: item.total,
      p_id_customer: customer,
      p_first_name: '',
      p_description_order: '',
      p_pay_method: pay_method,
      p_seal_man: seal_man
    });
    if(rpcError){ console.log(rpcError); alert("خطأ في إدخال تفاصيل الطلب"); return; }
  }

  alert("تمت عملية البيع بنجاح");
  cart=[];
  renderCart();
  await loadProducts();
}

// تحميل البيانات عند بدء الصفحة
await loadCustomers();
await loadProducts();

});
</script>

</body>
</html>
