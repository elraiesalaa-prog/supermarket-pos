<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <title>نظام POS متقدم v3</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="Cairo-Regular.js"></script>
</head>

<body class="bg-gray-100 p-6">

  <div class="max-w-7xl mx-auto">
    <h1 class="text-3xl font-bold text-center mb-6">نظام POS متقدم v3</h1>

    <div class="grid grid-cols-3 gap-6">

      <!-- العملاء -->
      <div class="bg-white p-4 rounded shadow">
        <h2 class="font-bold mb-3">العميل</h2>
        <select id="customer" class="border p-2 w-full mb-3"></select>
        <select id="pay_method" class="border p-2 w-full mb-3">
          <option value="cash">نقد</option>
          <option value="bank">تحويل</option>
          <option value="later">آجل</option>
        </select>
        <input id="seal_man" class="border p-2 w-full" readonly />
      </div>

      <!-- المنتجات -->
      <div class="bg-white p-4 rounded shadow">
        <h2 class="font-bold mb-3">المنتجات</h2>
        <select id="product" class="border p-2 w-full mb-3"></select>
        <div class="flex gap-2 mb-3">
          <input id="price" class="border p-2 w-full" readonly />
          <input id="stock" class="border p-2 w-full" readonly />
        </div>
        <input id="qte" type="number" placeholder="الكمية" class="border p-2 w-full mb-3">
        <button onclick="addItem()" class="bg-blue-600 text-white w-full py-2 rounded">
          إضافة للسلة
        </button>
      </div>

      <!-- الإجمالي -->
      <div class="bg-white p-4 rounded shadow">
        <h2 class="font-bold mb-3">الإجمالي</h2>
        <div class="text-xl font-bold mb-4">
          الإجمالي : <span id="total">0</span>
        </div>
        <div class="flex flex-col gap-2">
          <button onclick="showInvoiceModal()" class="bg-yellow-600 text-white w-full py-2 rounded">
            عرض الفاتورة
          </button>
          <button id="saveBtn" onclick="saveInvoice()" class="bg-green-600 text-white w-full py-2 rounded">
            إتمام البيع
          </button>
        </div>
      </div>

    </div>

    <!-- السلة -->
    <div class="bg-white mt-6 p-4 rounded shadow">
      <table class="w-full text-center">
        <thead class="bg-gray-200">
          <tr>
            <th>المنتج</th>
            <th>السعر</th>
            <th>الكمية</th>
            <th>المجموع</th>
            <th>حذف</th>
          </tr>
        </thead>
        <tbody id="cart"></tbody>
      </table>
    </div>

  </div>

  <!-- نافذة الفاتورة -->
  <div id="invoiceModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
    <div class="bg-white p-6 rounded shadow w-3/4 max-w-3xl">
      <h2 class="text-xl font-bold mb-4 text-center">فاتورة البيع</h2>

      <table class="w-full text-center border">
        <thead class="bg-gray-200">
          <tr>
            <th class="border p-2">المنتج</th>
            <th class="border p-2">السعر</th>
            <th class="border p-2">الكمية</th>
            <th class="border p-2">المجموع</th>
          </tr>
        </thead>
        <tbody id="invoiceTable"></tbody>
      </table>

      <div class="text-xl font-bold mt-4 text-left">
        الإجمالي : <span id="invoiceTotal">0</span>
      </div>

      <div class="flex justify-center gap-4 mt-4">
        <button onclick="printPDF()" class="bg-blue-600 text-white px-4 py-2 rounded">
          طباعة PDF
        </button>
        <button onclick="closeInvoice()" class="bg-red-600 text-white px-4 py-2 rounded">
          إغلاق
        </button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {

      const supabase = window.supabase.createClient(
        "https://vmxbedovoahuggfpcmyk.supabase.co",
        "sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU"
      );

      const currentUserName = "Alaadin Adam";
      document.getElementById("seal_man").value = currentUserName;

      let products = [];
      let cart = [];

      /* تحميل العملاء */
      async function loadCustomers() {
        const { data, error } = await supabase.from("customers").select("id_customer,first_name");
        if (error) { alert(error.message); return; }
        let select = document.getElementById("customer");
        select.innerHTML = "";
        data.forEach(c => {
          let op = document.createElement("option");
          op.value = c.id_customer;
          op.textContent = c.first_name;
          select.appendChild(op);
        });
      }

      /* تحميل المنتجات */
      async function loadProducts() {
        const { data, error } = await supabase.from("products").select("id_product,product_name,seal_price,qte_in_stock");
        if (error) { alert(error.message); return; }
        products = data;
        let select = document.getElementById("product");
        select.innerHTML = "";
        data.forEach(p => {
          let op = document.createElement("option");
          op.value = p.id_product;
          op.textContent = p.product_name;
          select.appendChild(op);
        });
        select.addEventListener("change", showProduct);
        showProduct();
      }

      /* عرض المنتج */
      function showProduct() {
        let id = document.getElementById("product").value;
        let p = products.find(x => x.id_product == id);
        if (!p) return;
        document.getElementById("price").value = p.seal_price;
        document.getElementById("stock").value = p.qte_in_stock;
      }

      /* عرض السلة */
      function renderCart() {
        let table = document.getElementById("cart");
        table.innerHTML = "";
        let total = 0;
        cart.forEach((i, index) => {
          total += i.total;
          table.innerHTML += `
            <tr class="border-b">
              <td>${i.name}</td>
              <td>${i.price}</td>
              <td>${i.qte}</td>
              <td>${i.total}</td>
              <td>
                <button onclick="removeItem(${index})" class="text-red-600">حذف</button>
              </td>
            </tr>`;
        });
        document.getElementById("total").innerText = total;
      }

      /* إضافة للسلة */
      window.addItem = function () {
        let productId = document.getElementById("product").value;
        let qte = parseFloat(document.getElementById("qte").value);
        let product = products.find(p => p.id_product == productId);

        if (!qte || qte <= 0) { alert("ادخل الكمية"); return; }
        if (qte > product.qte_in_stock) { alert("الكمية أكبر من المخزون"); return; }

        cart.push({
          id_product: productId,
          name: product.product_name,
          price: product.seal_price,
          qte: qte,
          total: qte * product.seal_price
        });

        renderCart();
      }

      /* حذف من السلة */
      window.removeItem = function (index) {
        cart.splice(index, 1);
        renderCart();
      }

      /* عرض الفاتورة */
      window.showInvoiceModal = function () {
        let table = document.getElementById("invoiceTable");
        table.innerHTML = "";
        let total = 0;
        cart.forEach(i => {
          total += i.total;
          table.innerHTML += `
            <tr>
              <td class="border p-2">${i.name}</td>
              <td class="border p-2">${i.price}</td>
              <td class="border p-2">${i.qte}</td>
              <td class="border p-2">${i.total}</td>
            </tr>`;
        });
        document.getElementById("invoiceTotal").innerText = total;
        document.getElementById("invoiceModal").classList.remove("hidden");
      }

      /* إغلاق الفاتورة */
      window.closeInvoice = function () {
        document.getElementById("invoiceModal").classList.add("hidden");
      }

      /* حفظ الفاتورة */
      window.saveInvoice = async function () {
        if (cart.length == 0) { alert("السلة فارغة"); return; }
        let btn = document.getElementById("saveBtn");
        btn.disabled = true;

        let customer = document.getElementById("customer").value;
        let pay_method = document.getElementById("pay_method").value;
        let seal_man = document.getElementById("seal_man").value;

        const { data, error } = await supabase.from("orders_o").insert([{
          customer_id: customer,
          date_order: new Date(),
          pay_method: pay_method,
          seal_man: seal_man
        }]).select();

        if (error) { alert(error.message); btn.disabled = false; return; }

        let orderId = data[0].id_order;
        for (let item of cart) {
          await supabase.from("orders_details").insert([{
            id_product: item.id_product,
            id_order: orderId,
            qte: item.qte,
            price: item.price,
            descount: 0,
            amount: item.total,
            total_amount: item.total,
            id_customer: customer,
            date_order: new Date(),
            pay_method: pay_method,
            description_order: "",
            seal_man: seal_man,
            first_name: ""
          }]);
        }

        alert("تمت عملية البيع بنجاح");
        cart = [];
        renderCart();
        await loadProducts();
        btn.disabled = false;
      }

      /* تحميل البيانات */
      await loadCustomers();
      await loadProducts();
    });
  </script>

  <!-- دالة طباعة PDF -->
  <script>
window.printPDF = function() {
  // اختر الفاتورة الموجودة في DOM
  const invoice = document.getElementById("invoiceModal").querySelector("table");
  const invoiceTotal = document.getElementById("invoiceTotal").innerText;

  // إنشاء نسخة للفاتورة لتعديل الخطوط والاتجاه
  const element = invoice.cloneNode(true);
  element.style.fontFamily = "Arial, Tahoma, sans-serif";
  element.setAttribute("dir", "rtl");

  // إضافة الإجمالي أسفل الجدول
  const totalDiv = document.createElement("div");
  totalDiv.innerText = "الإجمالي: " + invoiceTotal;
  totalDiv.style.textAlign = "right";
  totalDiv.style.fontSize = "16px";
  totalDiv.style.fontWeight = "bold";
  totalDiv.style.marginTop = "15px";
  element.parentNode?.appendChild(totalDiv);

  // إنشاء عنصر container لتجميع الجدول والإجمالي
  const container = document.createElement("div");
  container.appendChild(element);
  container.appendChild(totalDiv);

  const opt = {
    margin: 0.5,
    filename: "فاتورة.pdf",
    image: { type: "jpeg", quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: "cm", format: "a4", orientation: "portrait" }
  };

  html2pdf().set(opt).from(container).save();
};
</script>
  </script>

</body>
</html>
