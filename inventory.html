<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة المخزون</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
<h2>📦 إدارة المنتجات</h2>
<button onclick="logout()">خروج</button>
</header>

<div class="pos-container">

<h3>➕ إضافة منتج</h3>

<input type="text" id="name" placeholder="اسم المنتج">
<input type="text" id="barcode" placeholder="الباركود">
<input type="number" id="cost_price" placeholder="سعر التكلفة">
<input type="number" id="price" placeholder="سعر البيع">
<input type="number" id="stock" placeholder="الكمية">
<input type="number" id="min_stock" placeholder="حد التنبيه">

<button onclick="addProduct()">إضافة</button>

<hr>

<h3>📋 قائمة المنتجات</h3>

<table id="productsTable" border="1" width="100%">
<thead>
<tr>
<th>الاسم</th>
<th>السعر</th>
<th>المخزون</th>
<th>تنبيه</th>
<th>حذف</th>
</tr>
</thead>
<script>
protectPage(["storekeeper","manager","admin"]);
</script>
<tbody></tbody>
</table>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/inventory.js"></script>

</body>
</html>
