<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء نسخة احتياطية</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
  h1 { margin-bottom: 20px; }
  button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 5px; }
  #status { margin-top: 10px; font-weight: bold; }
  #progressContainer { width: 100%; background: #ddd; border-radius: 5px; margin-top: 15px; }
  #progressBar { width: 0%; height: 20px; background: #4CAF50; border-radius: 5px; text-align: center; color: white; line-height: 20px; }
</style>
</head>
<body>

<h1>إنشاء نسخة احتياطية لقاعدة البيانات</h1>
<button id="backupBtn">إنشاء النسخة الاحتياطية</button>
<div id="status"></div>
<div id="progressContainer">
  <div id="progressBar">0%</div>
</div>

<script>
  const backupBtn = document.getElementById('backupBtn');
  const status = document.getElementById('status');
  const progressBar = document.getElementById('progressBar');

  backupBtn.addEventListener('click', async () => {
    status.textContent = "جارٍ إنشاء النسخة الاحتياطية...";
    progressBar.style.width = '0%';
    progressBar.textContent = '0%';

    try {
      const response = await fetch('https://YOUR_PROJECT.functions.supabase.co/backup', {
        method: 'POST'
      });

      if (!response.ok) throw new Error('فشل إنشاء النسخة الاحتياطية');

      const reader = response.body.getReader();
      const contentLength = +response.headers.get('Content-Length') || 0;
      let receivedLength = 0;
      let chunks = [];

      while(true){
        const {done, value} = await reader.read();
        if (done) break;
        chunks.push(value);
        receivedLength += value.length;

        if (contentLength) {
          let percent = Math.floor((receivedLength / contentLength) * 100);
          progressBar.style.width = percent + '%';
          progressBar.textContent = percent + '%';
        }
      }

      const blob = new Blob(chunks, { type: 'application/gzip' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `backup_${new Date().toISOString().split('T')[0]}.backup.gz`;
      a.click();
      window.URL.revokeObjectURL(url);

      progressBar.style.width = '100%';
      progressBar.textContent = '100%';
      status.textContent = "تم إنشاء النسخة الاحتياطية بنجاح!";
    } catch (error) {
      status.textContent = "حدث خطأ: " + error.message;
      progressBar.style.width = '0%';
      progressBar.textContent = '0%';
    }
  });
</script>

</body>
</html>
