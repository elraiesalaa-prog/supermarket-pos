<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء نسخة احتياطية</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; background:#f5f5f5; }
  button { padding:10px 20px; font-size:16px; cursor:pointer; background:#4CAF50; color:white; border:none; border-radius:5px; }
  #status { margin-top:20px; font-weight:bold; }
</style>
</head>
<body>

<h1>إنشاء نسخة احتياطية لقاعدة البيانات</h1>
<button id="backupBtn">إنشاء النسخة الاحتياطية</button>
<div id="status"></div>

<script>
  // اتصال بـ Supabase
  const supabaseUrl = "https://YOUR_SUPABASE_PROJECT.supabase.co";
  const supabaseKey = "YOUR_SUPABASE_ANON_KEY";
  const supabase = supabase.createClient(supabaseUrl, supabaseKey);

  const status = document.getElementById('status');
  const backupBtn = document.getElementById('backupBtn');

  backupBtn.addEventListener('click', async () => {
    status.textContent = "جارٍ إنشاء النسخة الاحتياطية...";

    try {
      // مثال: طلب نسخة احتياطية عبر Supabase Function
      const response = await fetch('https://YOUR_SUPABASE_FUNCTION_ENDPOINT/backup', {
        method: 'POST'
      });

      if (!response.ok) throw new Error('فشل إنشاء النسخة الاحتياطية');

      const blob = await response.blob();
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `backup_${new Date().toISOString().split('T')[0]}.sql`;
      a.click();
      window.URL.revokeObjectURL(url);

      status.textContent = "تم إنشاء النسخة الاحتياطية بنجاح!";
    } catch (error) {
      status.textContent = "حدث خطأ: " + error.message;
    }
  });
</script>

</body>
</html>
