<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>إدارة الموردين</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>

<body class="bg-gradient-to-r from-blue-50 to-blue-100 min-h-screen p-6">

<div class="max-w-7xl mx-auto bg-white shadow-xl rounded-xl p-6">

<h1 class="text-3xl font-bold text-center text-blue-700 mb-6">
إدارة الموردين
</h1>

<!-- البحث -->
<div class="mb-4 flex gap-2">

<input id="search"
placeholder="بحث باسم المورد أو الشركة"
class="border p-2 rounded w-full">

<button onclick="renderTable()"
class="bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded">
بحث
</button>

<button onclick="printImportersPDF()"
class="bg-red-600 text-white px-5 py-2 rounded">
PDF
</button>

</div>

<!-- نموذج الإدخال -->
<div class="grid grid-cols-2 gap-4 mb-6">

<input id="name" placeholder="اسم المورد" class="border p-2 rounded">
<input id="comp" placeholder="الشركة" class="border p-2 rounded">
<input id="tel" placeholder="الهاتف" class="border p-2 rounded">
<input id="whatsapp" placeholder="واتساب" class="border p-2 rounded">
<input id="email" placeholder="البريد الإلكتروني" class="border p-2 rounded">
<input type="file" id="image" class="border p-2 rounded">

</div>

<!-- الأزرار -->
<div class="flex gap-3 mb-6">

<button onclick="addImporter()"
class="bg-green-600 text-white px-5 py-2 rounded">إضافة</button>

<button onclick="updateImporter()"
class="bg-yellow-500 text-white px-5 py-2 rounded">حفظ التعديل</button>

<button onclick="clearForm()"
class="bg-gray-500 text-white px-5 py-2 rounded">جديد</button>

<a href="index.html"
class="bg-blue-600 text-white px-5 py-2 rounded">رجوع</a>

</div>

<!-- جدول الموردين -->
<div class="overflow-auto">

<table class="w-full border text-center">

<thead class="bg-blue-600 text-white">

<tr>
<th>الصورة</th>
<th>رقم المورد</th>
<th>الاسم</th>
<th>الشركة</th>
<th>الهاتف</th>
<th>واتساب</th>
<th>البريد</th>
<th>اتصال</th>
<th>واتساب</th>
<th>تعديل</th>
<th>حذف</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

<script>

const supabaseUrl="https://vmxbedovoahuggfpcmyk.supabase.co";
const supabaseKey="sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU";

const supabaseClient=supabase.createClient(supabaseUrl,supabaseKey);

let data=[];
let editID=null;

loadImporters();

async function loadImporters(){

const {data:rows,error}=await supabaseClient
.from("importer")
.select("*")
.order("import_id",{ascending:false});

if(error){
alert(error.message);
return;
}

data=rows;
renderTable();

}

function renderTable(){

let search=document.getElementById("search").value.toLowerCase();

let filtered=data.filter(r=>
(r.name||"").toLowerCase().includes(search) ||
(r.comp||"").toLowerCase().includes(search)
);

let table="";

filtered.forEach(row=>{

let img="";

if(row.import_image){
img=`<img src="data:image/png;base64,${row.import_image}" class="w-12 h-12 rounded-full mx-auto">`;
}

table+=`
<tr class="border">
<td>${img}</td>
<td>${row.import_id}</td>
<td>${row.name||""}</td>
<td>${row.comp||""}</td>
<td>${row.tel||""}</td>
<td>${row.whatsapp||""}</td>
<td>${row.email||""}</td>

<td><a href="tel:${row.tel}" class="bg-green-500 text-white px-2 py-1 rounded">📞</a></td>
<td><a href="https://wa.me/${row.whatsapp}" target="_blank" class="bg-green-600 text-white px-2 py-1 rounded">💬</a></td>

<td><button onclick="editRow(${row.import_id})" class="bg-yellow-400 px-3 py-1 rounded">تعديل</button></td>
<td><button onclick="deleteRow(${row.import_id})" class="bg-red-600 text-white px-3 py-1 rounded">حذف</button></td>
</tr>
`;
});

document.getElementById("tableBody").innerHTML=table;

}

// ✅ طباعة PDF منظمة داخل جدول
function printImportersPDF(){

let element=document.createElement("div");

let html=`
<div style="direction:rtl;font-family:Arial;padding:10px">

<h2 style="text-align:center;margin-bottom:20px;">
كشف الموردين
</h2>

<table style="width:100%;border-collapse:collapse;text-align:center;font-size:12px">

<tr style="background:#2c3e50;color:white">
<th style="border:1px solid #000;padding:6px;">الصورة</th>
<th style="border:1px solid #000;padding:6px;">رقم المورد</th>
<th style="border:1px solid #000;padding:6px;">الاسم</th>
<th style="border:1px solid #000;padding:6px;">الشركة</th>
<th style="border:1px solid #000;padding:6px;">الهاتف</th>
<th style="border:1px solid #000;padding:6px;">واتساب</th>
<th style="border:1px solid #000;padding:6px;">البريد</th>
</tr>
`;

data.forEach(r=>{

let img="";

if(r.import_image){
img=`<img src="data:image/png;base64,${r.import_image}" style="width:35px;height:35px;border-radius:50%">`;
}

html+=`
<tr>
<td style="border:1px solid #000;padding:5px;">${img}</td>
<td style="border:1px solid #000;padding:5px;">${r.import_id}</td>
<td style="border:1px solid #000;padding:5px;">${r.name||""}</td>
<td style="border:1px solid #000;padding:5px;">${r.comp||""}</td>
<td style="border:1px solid #000;padding:5px;">${r.tel||""}</td>
<td style="border:1px solid #000;padding:5px;">${r.whatsapp||""}</td>
<td style="border:1px solid #000;padding:5px;">${r.email||""}</td>
</tr>
`;
});

html+=`</table></div>`;

element.innerHTML=html;

html2pdf().set({
margin:5,
filename:"importers.pdf",
html2canvas:{scale:2},
jsPDF:{unit:"mm",format:"a4",orientation:"portrait"}
}).from(element).save();

}

document.getElementById("search").addEventListener("input",renderTable);

</script>

</body>
</html>
