<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>نظام بيع المنتجات</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 p-6">

<div class="max-w-7xl mx-auto">

<h1 class="text-2xl font-bold mb-6 text-center">
إدارة عمليات البيع
</h1>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

<!-- نموذج البيع -->

<div class="bg-white p-6 rounded shadow">

<h2 class="text-xl font-bold mb-4">إضافة عملية بيع</h2>

<select id="product" class="w-full border p-2 rounded mb-3"></select>

<select id="customer" class="w-full border p-2 rounded mb-3"></select>

<input type="number" id="qte" placeholder="الكمية"
class="w-full border p-2 rounded mb-3">

<input type="number" id="price" placeholder="السعر"
class="w-full border p-2 rounded mb-3">

<input type="number" id="discount" placeholder="الخصم"
class="w-full border p-2 rounded mb-3">

<input type="number" id="amount" placeholder="المبلغ"
class="w-full border p-2 rounded mb-3" readonly>

<input type="number" id="total_amount" placeholder="الإجمالي"
class="w-full border p-2 rounded mb-3" readonly>

<select id="pay_method" class="w-full border p-2 rounded mb-3">

<option value="cash">نقد</option>
<option value="bank">تحويل بنكي</option>
<option value="later">آجل</option>

</select>

<input type="text" id="seal_man"
placeholder="اسم البائع"
class="w-full border p-2 rounded mb-3">

<textarea id="description"
placeholder="وصف الطلب"
class="w-full border p-2 rounded mb-3"></textarea>

<button onclick="saveSale()"
class="bg-blue-600 text-white px-4 py-2 rounded w-full">
حفظ عملية البيع
</button>

</div>


<!-- جدول العمليات -->

<div class="bg-white p-6 rounded shadow">

<h2 class="text-xl font-bold mb-4">عمليات البيع</h2>

<div class="overflow-auto max-h-96">

<table class="w-full text-sm text-center">

<thead class="bg-gray-200">

<tr>

<th>المنتج</th>
<th>العميل</th>
<th>الكمية</th>
<th>السعر</th>
<th>الخصم</th>
<th>الإجمالي</th>
<th>التاريخ</th>

</tr>

</thead>

<tbody id="salesTable"></tbody>

</table>

</div>

</div>

</div>

</div>

<script>

const supabase = window.supabase.createClient(
"YOUR_SUPABASE_URL",
"YOUR_SUPABASE_ANON_KEY"
)

loadProducts()
loadCustomers()
loadSales()

document.getElementById("qte").addEventListener("input",calculate)
document.getElementById("price").addEventListener("input",calculate)
document.getElementById("discount").addEventListener("input",calculate)

function calculate(){

let qte = Number(document.getElementById("qte").value)
let price = Number(document.getElementById("price").value)
let discount = Number(document.getElementById("discount").value)

let amount = qte * price
let total = amount - discount

document.getElementById("amount").value = amount
document.getElementById("total_amount").value = total

}

async function loadProducts(){

const {data} = await supabase
.from("products")
.select("*")

let select = document.getElementById("product")

data.forEach(p=>{

let option = document.createElement("option")

option.value = p.id_product
option.textContent = p.name_product

select.appendChild(option)

})

}

async function loadCustomers(){

const {data} = await supabase
.from("customers")
.select("*")

let select = document.getElementById("customer")

data.forEach(c=>{

let option = document.createElement("option")

option.value = c.id_customer
option.textContent = c.first_name

select.appendChild(option)

})

}

async function saveSale(){

let id_product = document.getElementById("product").value
let id_customer = document.getElementById("customer").value
let qte = document.getElementById("qte").value
let price = document.getElementById("price").value
let discount = document.getElementById("discount").value
let amount = document.getElementById("amount").value
let total_amount = document.getElementById("total_amount").value
let pay_method = document.getElementById("pay_method").value
let description = document.getElementById("description").value
let seal_man = document.getElementById("seal_man").value

await supabase
.from("orders_details")
.insert([{

id_product:id_product,
qte:qte,
price:price,
descount:discount,
amount:amount,
total_amount:total_amount,
id_customer:id_customer,
date_order:new Date(),
pay_method:pay_method,
description_order:description,
seal_man:seal_man

}])

loadSales()

}

async function loadSales(){

const {data} = await supabase
.from("orders_details")
.select(`
*,
products(name_product),
customers(first_name)
`)
.order("id",{ascending:false})

let table = document.getElementById("salesTable")

table.innerHTML=""

data.forEach(s=>{

let row=`

<tr class="border-b">

<td>${s.products?.name_product ?? ""}</td>
<td>${s.customers?.first_name ?? ""}</td>
<td>${s.qte}</td>
<td>${s.price}</td>
<td>${s.descount}</td>
<td>${s.total_amount}</td>
<td>${new Date(s.date_order).toLocaleDateString()}</td>

</tr>
`

table.innerHTML+=row

})

}

</script>

</body>
</html>
