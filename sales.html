```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>نظام الفواتير</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 p-6">

<div class="max-w-7xl mx-auto">

<h1 class="text-2xl font-bold text-center mb-6">
نظام بيع المنتجات (الفواتير)
</h1>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">

<!-- معلومات الفاتورة -->

<div class="bg-white p-4 rounded shadow">

<h2 class="font-bold mb-3">معلومات الفاتورة</h2>

<select id="customer" class="w-full border p-2 rounded mb-3"></select>

<select id="pay_method" class="w-full border p-2 rounded mb-3">

<option value="cash">نقد</option>
<option value="bank">تحويل</option>
<option value="later">آجل</option>

</select>

<input type="text" id="seal_man"
placeholder="البائع"
class="w-full border p-2 rounded mb-3">

<textarea id="description"
placeholder="ملاحظات"
class="w-full border p-2 rounded mb-3"></textarea>

</div>

<!-- إضافة منتج -->

<div class="bg-white p-4 rounded shadow">

<h2 class="font-bold mb-3">إضافة منتج</h2>

<select id="product" class="w-full border p-2 rounded mb-3"></select>

<input type="number" id="qte"
placeholder="الكمية"
class="w-full border p-2 rounded mb-3">

<input type="number" id="price"
placeholder="السعر"
class="w-full border p-2 rounded mb-3">

<input type="number" id="discount"
placeholder="الخصم"
class="w-full border p-2 rounded mb-3">

<button onclick="addItem()"
class="bg-blue-600 text-white w-full py-2 rounded">
إضافة للصنف
</button>

</div>

<!-- إجمالي الفاتورة -->

<div class="bg-white p-4 rounded shadow">

<h2 class="font-bold mb-3">إجمالي الفاتورة</h2>

<div class="text-xl font-bold mb-3">

الإجمالي :
<span id="totalInvoice">0</span>

</div>

<button onclick="saveInvoice()"
class="bg-green-600 text-white w-full py-2 rounded">
حفظ الفاتورة
</button>

</div>

</div>

<!-- جدول المنتجات -->

<div class="bg-white mt-6 p-4 rounded shadow">

<table class="w-full text-center">

<thead class="bg-gray-200">

<tr>

<th>المنتج</th>
<th>الكمية</th>
<th>السعر</th>
<th>الخصم</th>
<th>الإجمالي</th>
<th>حذف</th>

</tr>

</thead>

<tbody id="itemsTable"></tbody>

</table>

</div>

</div>

<script>

const supabase = window.supabase.createClient(
"YOUR_SUPABASE_URL",
"YOUR_SUPABASE_KEY"
)

let cart = []

loadProducts()
loadCustomers()

async function loadProducts(){

const {data} = await supabase
.from("products")
.select("*")

let select = document.getElementById("product")

data.forEach(p=>{

let option = document.createElement("option")

option.value = p.id_product
option.textContent = p.name_product

select.appendChild(option)

})

}

async function loadCustomers(){

const {data} = await supabase
.from("customers")
.select("*")

let select = document.getElementById("customer")

data.forEach(c=>{

let option = document.createElement("option")

option.value = c.id_customer
option.textContent = c.first_name

select.appendChild(option)

})

}

function addItem(){

let product = document.getElementById("product")
let qte = Number(document.getElementById("qte").value)
let price = Number(document.getElementById("price").value)
let discount = Number(document.getElementById("discount").value)

let total = (qte * price) - discount

cart.push({

id_product:product.value,
product_name:product.options[product.selectedIndex].text,
qte:qte,
price:price,
descount:discount,
amount:qte*price,
total_amount:total

})

renderCart()

}

function renderCart(){

let table = document.getElementById("itemsTable")

table.innerHTML=""

let totalInvoice=0

cart.forEach((item,index)=>{

totalInvoice+=item.total_amount

let row=`

<tr class="border-b">

<td>${item.product_name}</td>
<td>${item.qte}</td>
<td>${item.price}</td>
<td>${item.descount}</td>
<td>${item.total_amount}</td>

<td>

<button onclick="removeItem(${index})"
class="text-red-600">
حذف
</button>

</td>

</tr>
`

table.innerHTML+=row

})

document.getElementById("totalInvoice").innerText=totalInvoice

}

function removeItem(index){

cart.splice(index,1)

renderCart()

}

async function saveInvoice(){

let customer = document.getElementById("customer").value
let pay_method = document.getElementById("pay_method").value
let description = document.getElementById("description").value
let seal_man = document.getElementById("seal_man").value

const {data,error} = await supabase
.from("orders_o")
.insert([{

customer_id:customer,
date_order:new Date(),
pay_method:pay_method,
description_order:description,
seal_man:seal_man

}])
.select()

let orderId = data[0].id_order

let details = cart.map(item=>({

id_product:item.id_product,
id_order:orderId,
qte:item.qte,
price:item.price,
descount:item.descount,
amount:item.amount,
total_amount:item.total_amount,
id_customer:customer,
date_order:new Date(),
pay_method:pay_method,
description_order:description,
seal_man:seal_man

}))

await supabase
.from("orders_details")
.insert(details)

alert("تم حفظ الفاتورة")

cart=[]

renderCart()

}

</script>

</body>
</html>
```
