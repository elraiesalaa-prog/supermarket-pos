```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>بيع المنتجات</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 p-6">

<div class="max-w-7xl mx-auto">

<h1 class="text-2xl font-bold text-center mb-6">
نظام بيع المنتجات
</h1>

<div class="grid grid-cols-3 gap-6">

<!-- معلومات الفاتورة -->

<div class="bg-white p-4 rounded shadow">

<h2 class="font-bold mb-3">العميل</h2>

<select id="customer" class="border p-2 w-full mb-3"></select>

<select id="pay_method" class="border p-2 w-full mb-3">

<option value="cash">نقد</option>
<option value="bank">تحويل</option>
<option value="later">آجل</option>

</select>

<input
id="seal_man"
placeholder="البائع"
class="border p-2 w-full"
/>

</div>

<!-- اختيار المنتج -->

<div class="bg-white p-4 rounded shadow">

<h2 class="font-bold mb-3">إضافة منتج</h2>

<select id="product" class="border p-2 w-full mb-3"></select>

<input
id="price"
placeholder="سعر البيع"
class="border p-2 w-full mb-3"
readonly
/>

<input
id="stock"
placeholder="المخزون"
class="border p-2 w-full mb-3"
readonly
/>

<input
id="qte"
type="number"
placeholder="الكمية"
class="border p-2 w-full mb-3"
/>

<button
onclick="addItem()"
class="bg-blue-600 text-white w-full py-2 rounded">

إضافة للسلة

</button>

</div>

<!-- إجمالي الفاتورة -->

<div class="bg-white p-4 rounded shadow">

<h2 class="font-bold mb-3">الإجمالي</h2>

<div class="text-xl font-bold mb-4">

الإجمالي :
<span id="total">0</span>

</div>

<button
onclick="saveInvoice()"
class="bg-green-600 text-white w-full py-2 rounded">

إتمام البيع

</button>

</div>

</div>

<!-- سلة المشتريات -->

<div class="bg-white mt-6 p-4 rounded shadow">

<table class="w-full text-center">

<thead class="bg-gray-200">

<tr>

<th>المنتج</th>
<th>السعر</th>
<th>الكمية</th>
<th>المجموع</th>
<th></th>

</tr>

</thead>

<tbody id="cart"></tbody>

</table>

</div>

</div>

<script>

const supabase = window.supabase.createClient(
"YOUR_SUPABASE_URL",
"YOUR_SUPABASE_KEY"
)

let products=[]
let cart=[]

loadProducts()
loadCustomers()

async function loadProducts(){

const {data}=await supabase
.from("products")
.select("*")

products=data

let select=document.getElementById("product")

data.forEach(p=>{

let option=document.createElement("option")

option.value=p.id_product
option.textContent=p.product_name

select.appendChild(option)

})

select.addEventListener("change",showProduct)

showProduct()

}

function showProduct(){

let id=document.getElementById("product").value

let p=products.find(x=>x.id_product==id)

document.getElementById("price").value=p.seal_price
document.getElementById("stock").value=p.qte_in_stock

}

async function loadCustomers(){

const {data}=await supabase
.from("customers")
.select("*")

let select=document.getElementById("customer")

data.forEach(c=>{

let option=document.createElement("option")

option.value=c.id_customer
option.textContent=c.first_name

select.appendChild(option)

})

}

function addItem(){

let productId=document.getElementById("product").value
let qte=parseFloat(document.getElementById("qte").value)

let product=products.find(p=>p.id_product==productId)

if(qte>product.qte_in_stock){

alert("الكمية أكبر من المخزون")

return

}

let total=qte*product.seal_price

cart.push({

id_product:productId,
name:product.product_name,
price:product.seal_price,
qte:qte,
total:total

})

renderCart()

}

function renderCart(){

let table=document.getElementById("cart")

table.innerHTML=""

let total=0

cart.forEach((i,index)=>{

total+=i.total

let row=`

<tr class="border-b">

<td>${i.name}</td>
<td>${i.price}</td>
<td>${i.qte}</td>
<td>${i.total}</td>

<td>

<button
onclick="removeItem(${index})"
class="text-red-600">

حذف

</button>

</td>

</tr>
`

table.innerHTML+=row

})

document.getElementById("total").innerText=total

}

function removeItem(index){

cart.splice(index,1)

renderCart()

}

async function saveInvoice(){

if(cart.length==0){

alert("السلة فارغة")
return

}

let customer=document.getElementById("customer").value
let pay_method=document.getElementById("pay_method").value
let seal_man=document.getElementById("seal_man").value

const {data}=await supabase
.from("orders_o")
.insert([{

customer_id:customer,
date_order:new Date(),
pay_method:pay_method,
seal_man:seal_man

}])
.select()

let orderId=data[0].id_order

for(let item of cart){

await supabase
.from("orders_details")
.insert([{

id_product:item.id_product,
id_order:orderId,
qte:item.qte,
price:item.price,
descount:0,
amount:item.total,
total_amount:item.total,
id_customer:customer,
date_order:new Date(),
pay_method:pay_method,
seal_man:seal_man

}])

let product=products.find(p=>p.id_product==item.id_product)

let newStock=product.qte_in_stock-item.qte

await supabase
.from("products")
.update({qte_in_stock:newStock})
.eq("id_product",item.id_product)

}

alert("تمت عملية البيع")

cart=[]

renderCart()

loadProducts()

}

</script>

</body>
</html>
```
