<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>نظام المبيعات</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 p-6">

<div class="max-w-6xl mx-auto bg-white shadow-lg rounded-xl p-6">

<h1 class="text-2xl font-bold mb-6 text-center">🛒 صفحة المبيعات</h1>

<div class="grid grid-cols-3 gap-4 mb-4">

<div>
<label>العميل</label>
<select id="customerSelect" class="w-full border p-2 rounded"></select>
</div>

<div>
<label>البائع</label>
<input id="sealMan" class="w-full border p-2 rounded">
</div>

<div>
<label>طريقة الدفع</label>
<select id="payMethod" class="w-full border p-2 rounded">
<option>نقدي</option>
<option>تحويل</option>
<option>آجل</option>
</select>
</div>

</div>

<hr class="my-4">

<h2 class="text-xl mb-3">إضافة منتج</h2>

<div class="grid grid-cols-4 gap-4">

<select id="productSelect" class="border p-2 rounded"></select>

<input type="number" id="qte" placeholder="الكمية" class="border p-2 rounded">

<input type="number" id="price" placeholder="السعر" class="border p-2 rounded">

<button onclick="addToCart()" class="bg-blue-600 text-white rounded p-2">
إضافة للسلة
</button>

</div>

<hr class="my-4">

<h2 class="text-xl mb-3">سلة المشتريات</h2>

<table class="w-full border">

<thead class="bg-gray-200">

<tr>
<th>المنتج</th>
<th>الكمية</th>
<th>السعر</th>
<th>الإجمالي</th>
<th>حذف</th>
</tr>

</thead>

<tbody id="cartTable"></tbody>

</table>

<div class="text-left mt-4 text-xl">

الإجمالي: <span id="total">0</span>

</div>

<button onclick="saveInvoice()" class="mt-6 bg-green-600 text-white p-3 rounded w-full">
💾 حفظ الفاتورة
</button>

</div>

<script>

const supabase = window.supabase.createClient(
https://vmxbedovoahuggfpcmyk.supabase.co
sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU

)

let cart=[]

let products=[]

async function loadCustomers(){

let {data}=await supabase
.from("customers")
.select("id_customer,first_name")

let select=document.getElementById("customerSelect")

data.forEach(c=>{

let op=document.createElement("option")

op.value=c.id_customer
op.text=c.first_name

select.appendChild(op)

})

}

async function loadProducts(){

let {data}=await supabase
.from("products")
.select("*")

products=data

let select=document.getElementById("productSelect")

data.forEach(p=>{

let op=document.createElement("option")

op.value=p.id_product
op.text=p.product_name

select.appendChild(op)

})

}

function addToCart(){

let productId=document.getElementById("productSelect").value
let qte=parseFloat(document.getElementById("qte").value)
let price=parseFloat(document.getElementById("price").value)

let product=products.find(p=>p.id_product==productId)

let total=qte*price

cart.push({

id_product:productId,
product_name:product.product_name,
qte:qte,
price:price,
total:total

})

renderCart()

}

function renderCart(){

let table=document.getElementById("cartTable")

table.innerHTML=""

let sum=0

cart.forEach((item,index)=>{

sum+=item.total

table.innerHTML+=`

<tr class="border">

<td>${item.product_name}</td>
<td>${item.qte}</td>
<td>${item.price}</td>
<td>${item.total}</td>

<td>
<button onclick="removeItem(${index})" class="bg-red-500 text-white px-2 rounded">
X
</button>
</td>

</tr>

`

})

document.getElementById("total").innerText=sum

}

function removeItem(index){

cart.splice(index,1)

renderCart()

}

async function saveInvoice(){

let customer=document.getElementById("customerSelect").value
let payMethod=document.getElementById("payMethod").value
let sealMan=document.getElementById("sealMan").value

let {data:order}=await supabase
.from("orders_o")
.insert({

customer_id:customer,
date_order:new Date(),
pay_method:payMethod,
seal_man:sealMan

})
.select()
.single()

let orderId=order.id_order

for(let item of cart){

await supabase
.from("orders_details")
.insert({

id_product:item.id_product,
id_order:orderId,
qte:item.qte,
price:item.price,
amount:item.total,
total_amount:item.total,
id_customer:customer,
date_order:new Date(),
pay_method:payMethod,
seal_man:sealMan

})

}

alert("تم حفظ الفاتورة")

cart=[]

renderCart()

}

loadCustomers()
loadProducts()

</script>

</body>
</html>
