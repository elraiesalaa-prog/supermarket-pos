<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>تقرير القروض</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
font-family:Tahoma;
}
</style>

</head>

<body class="bg-gray-100 p-6">

<div class="max-w-7xl mx-auto bg-white shadow-lg rounded-lg p-6">

<h1 class="text-3xl font-bold text-center text-blue-700 mb-6">
تقرير القروض
</h1>

<div class="flex gap-3 mb-6">

<input id="search"
placeholder="بحث باسم العميل"
class="border p-2 rounded w-full">

<button onclick="renderTable()" class="bg-green-600 text-white px-5 py-2 rounded">
بحث
</button>

<button onclick="printPDF()" class="bg-blue-600 text-white px-5 py-2 rounded">
طباعة التقرير
</button>

<a href="admin.html" class="bg-gray-600 text-white px-5 py-2 rounded">
رجوع
</a>

</div>

<!-- الإحصائيات -->
<div class="grid grid-cols-4 gap-4 mb-6 text-center text-lg font-bold">

<div class="bg-blue-100 p-4 rounded">
إجمالي القروض
<div id="totalLoans">0</div>
</div>

<div class="bg-green-100 p-4 rounded">
إجمالي المسدد
<div id="totalPaid">0</div>
</div>

<div class="bg-red-100 p-4 rounded">
المتبقي
<div id="totalRemain">0</div>
</div>

<div class="bg-yellow-100 p-4 rounded">
عدد العملاء
<div id="totalCustomers">0</div>
</div>

</div>

<!-- الجدول -->
<div class="overflow-auto">

<table class="w-full border text-center">

<thead class="bg-blue-600 text-white">

<tr>
<th>رقم القرض</th>
<th>اسم العميل</th>
<th>الوصف</th>
<th>قيمة القرض</th>
<th>المسدد</th>
<th>المتبقي</th>
<th>التاريخ</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

<script>

const supabaseUrl="https://vmxbedovoahuggfpcmyk.supabase.co";
const supabaseKey="sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU";

const supabaseClient=supabase.createClient(supabaseUrl,supabaseKey);

let data=[];

// تحميل القروض
async function loadLoans(){

const {data:rows,error}=await supabaseClient
.from("loans")
.select("*")
.order("loan_id",{ascending:false});

if(error){
alert("خطأ: "+error.message);
return;
}

data=rows || [];

renderTable();
calculateTotals();

}

// عرض الجدول
function renderTable(){

let search=document.getElementById("search").value.toLowerCase();

let filtered=data.filter(r=>
(r.c_name||"").toLowerCase().includes(search)
);

let table="";

filtered.forEach(row=>{

let remain=(row.loan_value||0)-(row.sadad||0);

let date=row.loan_date
? new Date(row.loan_date).toLocaleDateString()
: "";

table+=`

<tr class="border">

<td>${row.loan_id}</td>
<td>${row.c_name||""}</td>
<td>${row.loan_discripton||""}</td>
<td>${row.loan_value||0}</td>
<td>${row.sadad||0}</td>
<td class="text-red-600 font-bold">${remain}</td>
<td>${date}</td>

</tr>

`;

});

document.getElementById("tableBody").innerHTML=table;

}

// الحسابات
function calculateTotals(){

let totalLoans=0;
let totalPaid=0;
let customers=new Set();

data.forEach(r=>{

totalLoans+=Number(r.loan_value)||0;
totalPaid+=Number(r.sadad)||0;

if(r.c_name){
customers.add(r.c_name);
}

});

document.getElementById("totalLoans").innerText=totalLoans;
document.getElementById("totalPaid").innerText=totalPaid;
document.getElementById("totalRemain").innerText=totalLoans-totalPaid;
document.getElementById("totalCustomers").innerText=customers.size;

}

// طباعة PDF
function printPDF(){

if(data.length===0){
alert("لا توجد بيانات للطباعة");
return;
}

const { jsPDF } = window.jspdf;

let doc=new jsPDF({orientation:"landscape"});

doc.setFontSize(14);
doc.text("تقرير القروض",140,10,{align:"center"});

let rows=[];

data.forEach(r=>{

rows.push([
r.loan_id,
r.c_name||"",
r.loan_discripton||"",
r.loan_value||0,
r.sadad||0,
(r.loan_value||0)-(r.sadad||0),
r.loan_date ? new Date(r.loan_date).toLocaleDateString() : ""
]);

});

doc.autoTable({

startY:20,

head:[[
"رقم القرض",
"اسم العميل",
"الوصف",
"قيمة القرض",
"المسدد",
"المتبقي",
"التاريخ"
]],

body:rows,

styles:{
halign:"center",
fontSize:8
},

headStyles:{
fillColor:[41,128,185]
}

});

// الإحصائيات
let y=doc.lastAutoTable.finalY+10;

doc.text("إجمالي القروض: "+document.getElementById("totalLoans").innerText,14,y);
doc.text("إجمالي المسدد: "+document.getElementById("totalPaid").innerText,14,y+7);
doc.text("المتبقي: "+document.getElementById("totalRemain").innerText,14,y+14);
doc.text("عدد العملاء: "+document.getElementById("totalCustomers").innerText,14,y+21);

doc.save("loans_report.pdf");

}

// بحث مباشر
document.getElementById("search").addEventListener("input",renderTable);

// تشغيل
loadLoans();

</script>

</body>
</html>
