<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>كشف العملاء</title>

<!-- مكتبات -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    font-family:Arial;
    padding:20px;
    background:#f4f4f4;
}

table{
    border-collapse:collapse;
    width:100%;
    background:white;
    margin-top:20px;
}

th, td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}

th{
    background:#2c3e50;
    color:white;
}
</style>

</head>

<body>

<h1 class="text-3xl font-bold text-center text-blue-700 mb-6">إدارة العملاء</h1>

<div class="flex gap-3 mb-6">
<input id="search" placeholder="بحث باسم العميل" class="border p-2 rounded w-full">
<button onclick="printCustomersPDF()" class="bg-blue-600 text-white px-5 py-2 rounded">طباعة PDF</button>
</div>

<table>
<thead>
<tr>
<th>الصورة</th>
<th>رقم العميل</th>
<th>الاسم</th>
<th>الرصيد</th>
<th>الهاتف</th>
<th>واتساب</th>
<th>البريد</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<script>
const supabaseUrl="https://vmxbedovoahuggfpcmyk.supabase.co";
const supabaseKey="sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU";
const supabaseClient=supabase.createClient(supabaseUrl,supabaseKey);

let data=[];

// تحميل العملاء
async function loadCustomers(){
    const {data:rows,error}=await supabaseClient.from("customers").select("*").order("id_customer",{ascending:true});
    if(error){ alert(error.message); return; }
    data=rows || [];
    renderTable();
}

// رسم الجدول
function renderTable(){
    const search=document.getElementById("search").value.toLowerCase();
    const filtered=data.filter(r => (r.first_name||"").toLowerCase().includes(search));
    let table="";
    filtered.forEach(r=>{
        let img=r.customer_image?`<img src="data:image/png;base64,${r.customer_image}" style="width:35px;height:35px;border-radius:50%">`:"";
        table+=`
        <tr>
            <td>${img}</td>
            <td>${r.id_customer}</td>
            <td>${r.first_name||""}</td>
            <td>${r.balance||0}</td>
            <td>${r.tel||""}</td>
            <td>${r.whatsapp||""}</td>
            <td>${r.email||""}</td>
        </tr>
        `;
    });
    document.getElementById("tableBody").innerHTML=table;
}

// دالة طباعة PDF
function printCustomersPDF(){
    if(data.length===0){ alert("لا توجد بيانات للطباعة"); return; }

    let element=document.createElement("div");
    let html=`<div style="direction:rtl;font-family:Arial;padding:10px">
    <h2 style="text-align:center;margin-bottom:20px;">كشف العملاء</h2>
    <table style="width:100%;border-collapse:collapse;text-align:center;font-size:12px">
    <tr style="background:#2c3e50;color:white">
        <th style="border:1px solid #000;padding:6px;">الصورة</th>
        <th style="border:1px solid #000;padding:6px;">رقم العميل</th>
        <th style="border:1px solid #000;padding:6px;">الاسم</th>
        <th style="border:1px solid #000;padding:6px;">الرصيد</th>
        <th style="border:1px solid #000;padding:6px;">الهاتف</th>
        <th style="border:1px solid #000;padding:6px;">واتساب</th>
        <th style="border:1px solid #000;padding:6px;">البريد</th>
    </tr>`;
    
    data.forEach(r=>{
        let img=r.customer_image?`<img src="data:image/png;base64,${r.customer_image}" style="width:35px;height:35px;border-radius:50%">`:"";
        html+=`
        <tr>
            <td style="border:1px solid #000;padding:5px;">${img}</td>
            <td style="border:1px solid #000;padding:5px;">${r.id_customer}</td>
            <td style="border:1px solid #000;padding:5px;">${r.first_name||""}</td>
            <td style="border:1px solid #000;padding:5px;">${r.balance||0}</td>
            <td style="border:1px solid #000;padding:5px;">${r.tel||""}</td>
            <td style="border:1px solid #000;padding:5px;">${r.whatsapp||""}</td>
            <td style="border:1px solid #000;padding:5px;">${r.email||""}</td>
        </tr>`;
    });
    
    html+="</table></div>";
    element.innerHTML=html;

    html2pdf().set({
        margin:5,
        filename:"customers.pdf",
        html2canvas:{scale:2},
        jsPDF:{unit:"mm",format:"a4",orientation:"portrait"}
    }).from(element).save();
}

document.getElementById("search").addEventListener("input",renderTable);

loadCustomers();
</script>

</body>
</html>
