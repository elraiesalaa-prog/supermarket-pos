<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>توزيع التكاليف على المنتجات</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-blue-50 to-blue-100 min-h-screen p-6">

<div class="max-w-7xl mx-auto bg-white shadow-xl rounded-xl p-6">

<h1 class="text-3xl font-bold text-center text-blue-700 mb-6">
تقرير توزيع التكاليف على المنتجات
</h1>

<div class="mb-4">
<input id="searchInput" type="text" placeholder="ابحث بالرقم، البيان، أو النوع..." class="w-full border px-3 py-2 rounded">
</div>

<div class="grid grid-cols-2 gap-4 mb-6">
<div>
<label class="font-bold">رقم الطلبية</label>
<input id="req_id" type="text" class="w-full border rounded p-2">
</div>

<div>
<label class="font-bold">رقم المنتج</label>
<input id="product_num" type="number" class="w-full border rounded p-2">
</div>

<div>
<label class="font-bold">القيمة</label>
<input id="coast_value" type="number" class="w-full border rounded p-2">
</div>

<div>
<label class="font-bold">نوع المنصرف</label>
<select id="c_type" class="w-full border rounded p-2">
<option value="تكلفة منتجات">تكلفة منتجات</option>
<option value="منصرفات محلية">منصرفات محلية</option>
<option value="تكاليف اخرى">تكاليف اخرى</option>
</select>
</div>

<div>
<label class="font-bold">التاريخ</label>
<input id="co_date" type="date" class="w-full border rounded p-2">
</div>

<div class="col-span-2">
<label class="font-bold">البيان</label>
<input id="coast_discription" type="text" class="w-full border rounded p-2">
</div>
</div>

<div class="flex gap-3 mb-6 flex-wrap">
<button id="addBtn" onclick="addCoast()" class="bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded">إضافة</button>
<button id="updateBtn" onclick="updateCoast()" class="bg-yellow-500 hover:bg-yellow-600 text-white px-5 py-2 rounded">تعديل</button>
<button onclick="clearForm()" class="bg-gray-500 hover:bg-gray-600 text-white px-5 py-2 rounded">جديد</button>
<a href="index.html" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded">تراجع</a>
</div>

<div class="overflow-auto">
<table class="w-full border text-center">
<thead class="bg-blue-600 text-white">
<tr>
<th class="p-2">رقم المنصرف</th>
<th class="p-2">رقم الطلبية</th>
<th class="p-2">إجمالي المصروف</th>
<th class="p-2">عدد المنتجات</th>
<th class="p-2">تكلفة المنتج</th>
<th class="p-2">النوع</th>
<th class="p-2">البيان</th>
<th class="p-2">التاريخ</th>
<th class="p-2">تعديل</th>
<th class="p-2">حذف</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>
<button onclick="distributeCosts()" 
class="bg-purple-600 hover:bg-purple-700 text-white px-5 py-2 rounded">
توزيع التكلفة على المنتجات
</button>
<script>
const supabaseUrl = "https://vmxbedovoahuggfpcmyk.supabase.co";
const supabaseKey = "sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let editID = null;
let coastsData = [];
const updateBtn = document.getElementById("updateBtn");

// تحميل بيانات المصروفات
async function loadCoasts(){
  const { data, error } = await supabaseClient.from("coasts").select("*").order("coast_id",{ascending:false});
  if(error) return alert(error.message);
  coastsData = data;
  renderTable();
}

// دالة لحساب عدد المنتجات المرتبطة بنفس req_id
async function getProductCount(req_id){

  const { count, error } = await supabaseClient
    .from("products")
    .select("*", { count: "exact", head: true })
    .eq("req_id", req_id);

  if(error){
    console.log(error.message);
    return 0;
  }

  return count || 0;
}
// عرض الجدول مع حساب عدد المنتجات وتكلفة المنتج لكل طلبية
async function renderTable(){
  const searchTerm = document.getElementById("searchInput").value.toLowerCase();
  let table = "";

  // احصل على كل req_id فريدة
  const reqIDs = [...new Set(coastsData.map(c => c.req_id))];

  for(const req_id of reqIDs){
    // عدد المنتجات المرتبطة فعليًا بهذه الطلبية
    const productCount = await getProductCount(req_id);

    // إجمالي المصروفات للطلبية
    const group = coastsData.filter(c => c.req_id===req_id);
    const totalCost = group.reduce((sum,c)=>sum+Number(c.coast_value),0);
    const perProductCost = productCount>0 ? (totalCost/productCount).toFixed(2) : 0;

    group.forEach(row=>{
      if(
        (row.req_id || "").toLowerCase().includes(searchTerm) ||
        (row.coast_discription || "").toLowerCase().includes(searchTerm) ||
        (row.c_type || "").toLowerCase().includes(searchTerm)
      ){
        table += `
        <tr class="border">
          <td>${row.coast_id}</td>
          <td>${row.req_id}</td>
          <td>${totalCost}</td>
          <td>${productCount}</td>
          <td>${perProductCost}</td>
          <td>${row.c_type}</td>
          <td>${row.coast_discription || ""}</td>
          <td>${row.co_date}</td>
          <td>
            <button onclick="editRow(${row.coast_id})" class="bg-yellow-400 px-3 py-1 rounded">تعديل</button>
          </td>
          <td>
            <button onclick="deleteRow(${row.coast_id})" class="bg-red-600 text-white px-3 py-1 rounded">حذف</button>
          </td>
        </tr>`;
      }
    });
  }

  document.getElementById("tableBody").innerHTML = table;
}

document.getElementById("searchInput").addEventListener("input", renderTable);

// إضافة مصروف
async function addCoast(){
  const value = document.getElementById("coast_value").value;
  const type = document.getElementById("c_type").value;
  const desc = document.getElementById("coast_discription").value;
  const date = document.getElementById("co_date").value;
  const req = document.getElementById("req_id").value;
  const product_num = document.getElementById("product_num").value;

  const { error } = await supabaseClient.from("coasts")
    .insert([{ coast_value:value, c_type:type, coast_discription:desc, co_date:date, req_id:req, product_num }]);
  if(error) return alert(error.message);
  clearForm();
  loadCoasts();
}

// تعديل سجل
async function editRow(id){
  editID = id;
  const { data } = await supabaseClient.from("coasts").select("*").eq("coast_id", id).single();
  document.getElementById("coast_value").value = data.coast_value;
  document.getElementById("c_type").value = data.c_type;
  document.getElementById("coast_discription").value = data.coast_discription;
  document.getElementById("co_date").value = data.co_date;
  document.getElementById("req_id").value = data.req_id;
  document.getElementById("product_num").value = data.product_num;
  updateBtn.textContent = "حفظ";
}

// حفظ التعديل
async function updateCoast(){
  if(!editID) return alert("اختر سجل للتعديل");
  const value = document.getElementById("coast_value").value;
  const type = document.getElementById("c_type").value;
  const desc = document.getElementById("coast_discription").value;
  const date = document.getElementById("co_date").value;
  const req = document.getElementById("req_id").value;
  const product_num = document.getElementById("product_num").value;

  const { error } = await supabaseClient.from("coasts")
    .update({ coast_value:value, c_type:type, coast_discription:desc, co_date:date, req_id:req, product_num })
    .eq("coast_id", editID);
  if(error) return alert(error.message);

  updateBtn.textContent = "تعديل";
  clearForm();
  loadCoasts();
}

// حذف سجل
async function deleteRow(id){
  if(!confirm("هل تريد حذف هذا السجل؟")) return;
  const { error } = await supabaseClient.from("coasts").delete().eq("coast_id", id);
  if(error) return alert(error.message);
  loadCoasts();
}

// إعادة النموذج جديد
function clearForm(){
  editID = null;
  document.getElementById("coast_value").value = "";
  document.getElementById("coast_discription").value = "";
  document.getElementById("co_date").value = "";
  document.getElementById("req_id").value = "";
  document.getElementById("product_num").value = "";
  updateBtn.textContent = "تعديل";
}

// تحميل البيانات عند البداية
loadCoasts();
  async function distributeCosts(){

  // الحصول على الطلبات الموجودة في جدول المصروفات
  const { data: coasts, error } = await supabaseClient
    .from("coasts")
    .select("req_id, coast_value");

  if(error){
    alert(error.message);
    return;
  }

  // استخراج الطلبات الفريدة
  const reqIDs = [...new Set(coasts.map(c => c.req_id))];

  for(const req of reqIDs){

    // حساب اجمالي التكلفة للطلبية
    const totalCost = coasts
      .filter(c => c.req_id === req)
      .reduce((sum,c)=> sum + Number(c.coast_value),0);

    // حساب عدد المنتجات
    const { count } = await supabaseClient
      .from("products")
      .select("*",{count:"exact",head:true})
      .eq("req_id",req);

    const productCount = count || 0;

    if(productCount === 0) continue;

    const costPerProduct = totalCost / productCount;

    // تحديث المنتجات
    const { error:updateError } = await supabaseClient
      .from("products")
      .update({ coasts_value: costPerProduct })
      .eq("req_id",req);

    if(updateError){
      console.log(updateError.message);
    }

  }

  alert("تم توزيع التكاليف على المنتجات بنجاح");

}
</script>

</body>
</html>
