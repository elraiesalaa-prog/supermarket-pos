<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<title>لوحة المدير</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:linear-gradient(135deg,#1e3a8a,#0f172a);
font-family:tahoma;
}

.menu{
padding:10px;
margin-bottom:6px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.menu:hover{
background:#2563eb;
color:white;
transform:scale(1.05);
}

.panel{
background:white;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.topbar{
background:#0f172a;
color:white;
padding:10px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

</style>

</head>

<body>

<!-- الشريط العلوي -->
<div class="topbar">

<div>
👤 المستخدم :
<span id="usernameDisplay"></span>
</div>

<div>

<button onclick="editUser()"
class="bg-blue-500 px-3 py-1 rounded">
تعديل الاسم
</button>

</div>

</div>



<div class="flex h-[calc(100vh-50px)]">

<!-- القائمة اليمنى -->
<div class="w-64 panel p-4 overflow-y-auto">

<h2 class="text-xl font-bold text-center mb-4 text-blue-700">
القائمة الرئيسية
</h2>

<div class="menu">الأصناف</div>
<div class="menu">المنتجات</div>
<div class="menu">العملاء</div>
<div class="menu">الموردين</div>

<hr class="my-3">

<div class="menu">القروض</div>
<div class="menu">سداد القروض</div>

<hr class="my-3">

<div class="menu">قائمة الأسعار</div>
<div class="menu">أوزان بالكيلو</div>
<div class="menu">أوزان بالرطل</div>

<hr class="my-3">

<div class="menu">المصروفات</div>

<hr class="my-3">

<div class="menu">تعديل الترويسة</div>

</div>



<!-- الوسط -->
<div class="flex-1 flex items-center justify-center p-6">

<div class="bg-white rounded-xl shadow-2xl p-6 w-full h-full flex items-center justify-center">

<img src="pic9.png"
class="max-h-full max-w-full object-contain">

</div>

</div>



<!-- القائمة اليسرى -->
<div class="w-64 panel p-4 overflow-y-auto">

<h2 class="text-xl font-bold text-center mb-4 text-blue-700">
العمليات
</h2>

<div class="menu">المبيعات</div>
<div class="menu">تفاصيل المنتجات</div>
<div class="menu">الطلبيات</div>
<div class="menu">أرباح الطلبيات</div>

<hr class="my-3">

<div class="menu">فواتير مبدئية</div>
<div class="menu">فواتير نهائية</div>

<hr class="my-3">

<div class="menu">إنشاء نسخة احتياطية</div>
<div class="menu">استعادة نسخة احتياطية</div>

<hr class="my-3">

<div class="menu bg-red-500 text-white text-center" onclick="logout()">
خروج
</div>

</div>

</div>



<script>

function loadUser(){

let user = localStorage.getItem("username");

if(!user){

user = "مدير النظام";

localStorage.setItem("username",user);

}

document.getElementById("usernameDisplay").innerText = user;

}


function editUser(){

let newName = prompt("اكتب اسم المستخدم الجديد");

if(newName){

localStorage.setItem("username",newName);

loadUser();

}

}


function logout(){

localStorage.removeItem("username");

window.location="index.html";

}


loadUser();

</script>

</body>
</html>
