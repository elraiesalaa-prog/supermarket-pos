<!-- نافذة تغيير كلمة المرور -->
<div id="passwordBox" style="display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
width:90%;
max-width:300px">

<h3>تغيير كلمة المرور</h3>

<input type="password" id="oldPass" placeholder="القديمة" class="w-full border p-2 mb-2">
<input type="password" id="newPass" placeholder="الجديدة" class="w-full border p-2">

<br><br>

<button onclick="savePassword()" class="bg-blue-600 text-white px-3 py-1 rounded">حفظ</button>
<button onclick="closePassword()" class="bg-gray-400 px-3 py-1 rounded">إلغاء</button>

</div>

<script>

function go(page){
window.location.href = page;
}

const supabaseClient = supabase.createClient(
"https://vmxbedovoahuggfpcmyk.supabase.co",
"sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU"
)

function loadStore(){
let name = localStorage.getItem("storeName") || "ABM للتجارة والاستثمار"
let header = localStorage.getItem("storeHeader") || "نظام إدارة المبيعات"

document.getElementById("storeName").innerText=name
document.getElementById("storeHeader").innerText=header
}
loadStore()

function updateClock(){
let now = new Date()
document.getElementById("clock").innerHTML =
"🕒 " + now.toLocaleTimeString() + " | " + now.toLocaleDateString()
}
setInterval(updateClock,1000)

document.addEventListener("DOMContentLoaded", function(){
let user = localStorage.getItem("user")
if(!user){ window.location="index.html"; return }
document.getElementById("usernameDisplay").textContent = user
})

function logout(){
localStorage.clear()
window.location="index.html"
}

function editPassword(){
document.getElementById("passwordBox").style.display="block"
}

function closePassword(){
document.getElementById("passwordBox").style.display="none"
}

async function savePassword(){

let username = localStorage.getItem("user")
let oldPass = document.getElementById("oldPass").value
let newPass = document.getElementById("newPass").value

if(!oldPass || !newPass){
alert("أدخل جميع البيانات")
return
}

const {data,error}=await supabaseClient
.from("tb_users")
.select("*")
.eq("fullname",username)
.eq("pwd",oldPass)
.single()

if(error || !data){
alert("كلمة المرور غير صحيحة")
return
}

const {error:updateError}=await supabaseClient
.from("tb_users")
.update({pwd:newPass})
.eq("fullname",username)

if(updateError){
alert("خطأ في التحديث")
return
}

alert("تم التغيير بنجاح")
closePassword()
}

</script>
