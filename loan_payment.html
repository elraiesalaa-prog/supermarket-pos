<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>سداد القروض</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 p-6">

<div class="max-w-6xl mx-auto bg-white shadow-lg rounded-lg p-6">

<h1 class="text-2xl font-bold text-center text-blue-700 mb-6">
سداد القروض
</h1>

<div class="flex gap-3 mb-6">

<select id="customer_id" class="border p-2 rounded w-full"></select>

<button onclick="loadLoans()"
class="bg-blue-600 text-white px-5 py-2 rounded">
عرض القروض
</button>

<a href="index.html"
class="bg-gray-600 text-white px-5 py-2 rounded">
رجوع
</a>

</div>

<div class="overflow-auto">

<table class="w-full border text-center">

<thead class="bg-blue-600 text-white">

<tr>

<th>رقم القرض</th>
<th>الوصف</th>
<th>قيمة القرض</th>
<th>المسدد</th>
<th>المتبقي</th>
<th>مبلغ السداد</th>
<th>تنفيذ</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

<script>

const supabaseUrl="https://vmxbedovoahuggfpcmyk.supabase.co";
const supabaseKey="sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU";

const supabaseClient=supabase.createClient(supabaseUrl,supabaseKey);

let loans=[];

async function loadCustomers(){

const {data,error}=await supabaseClient
.from("customers")
.select("id_customer,first_name")
.order("first_name");

if(error){alert(error.message);return;}

let options="<option value=''>اختر العميل</option>";

data.forEach(c=>{
options+=`<option value="${c.id_customer}">${c.first_name}</option>`;
});

document.getElementById("customer_id").innerHTML=options;

}

async function loadLoans(){

const customer_id=document.getElementById("customer_id").value;

if(!customer_id){

alert("اختر العميل");

return;

}

const {data,error}=await supabaseClient
.from("loans")
.select("*")
.eq("customer_id",customer_id);

if(error){alert(error.message);return;}

loans=data;

renderTable();

}

function renderTable(){

let table="";

loans.forEach(row=>{

let remain=(row.loan_value||0)-(row.sadad||0);

table+=`

<tr class="border">

<td>${row.loan_id}</td>
<td>${row.loan_discripton||""}</td>
<td>${row.loan_value||0}</td>
<td>${row.sadad||0}</td>
<td class="text-red-600 font-bold">${remain}</td>

<td>
<input id="pay_${row.loan_id}" type="number"
class="border p-1 rounded w-24">
</td>

<td>

<button onclick="payLoan(${row.loan_id},${row.sadad||0})"
class="bg-green-600 text-white px-3 py-1 rounded">

سداد

</button>

</td>

</tr>

`;

});

document.getElementById("tableBody").innerHTML=table;

}

async function payLoan(id,currentSadad){

let pay=parseFloat(document.getElementById("pay_"+id).value);

if(!pay || pay<=0){

alert("ادخل مبلغ السداد");

return;

}

let newSadad=currentSadad+pay;

const {error}=await supabaseClient
.from("loans")
.update({sadad:newSadad})
.eq("loan_id",id);

if(error){

alert(error.message);

return;

}

loadLoans();

}

loadCustomers();

</script>

</body>
</html>
