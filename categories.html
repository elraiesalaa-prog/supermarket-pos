<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>إدارة الأصناف</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Tahoma;
background:#f2f2f2;
padding:20px;
}

.container{
width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px #ccc;
}

h2{
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:8px 15px;
border:none;
border-radius:5px;
cursor:pointer;
}

.add{background:#28a745;color:white;}
.edit{background:#ffc107;}
.delete{background:#dc3545;color:white;}
.logout{background:#333;color:white;margin-bottom:10px;}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#007bff;
color:white;
}

</style>

</head>

<body>

<div class="container">

<button class="logout" onclick="logout()">خروج</button>

<h2>إدارة الأصناف</h2>

<input type="text" id="description_cat" placeholder="اسم الصنف">

<br><br>

<button class="add" onclick="addCategory()">حفظ</button>

<table>

<thead>
<tr>
<th>الرقم</th>
<th>الصنف</th>
<th>تعديل</th>
<th>حذف</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<script>

const supabaseClient = window.supabase.createClient(
"https://vmxbedovoahuggfpcmyk.supabase.co",
"sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU"
);

let edit_id = null;


// تحميل الأصناف
async function loadCategories(){

const {data,error} = await supabaseClient
.from("categories")
.select("*")
.order("id_cat",{ascending:true});

let html="";

data.forEach(function(row){

html += `
<tr>

<td>${row.id_cat}</td>
<td>${row.description_cat}</td>

<td>
<button class="edit"
onclick="editCategory(${row.id_cat},'${row.description_cat}')">
تعديل
</button>
</td>

<td>
<button class="delete"
onclick="deleteCategory(${row.id_cat})">
حذف
</button>
</td>

</tr>
`;

});

document.getElementById("tableBody").innerHTML = html;

}



// إضافة أو تعديل
async function addCategory(){

let name = document.getElementById("description_cat").value;

if(name==""){
alert("اكتب اسم الصنف");
return;
}

if(edit_id==null){

await supabaseClient
.from("categories")
.insert([{description_cat:name}]);

}else{

await supabaseClient
.from("categories")
.update({description_cat:name})
.eq("id_cat",edit_id);

edit_id=null;

}

document.getElementById("description_cat").value="";

loadCategories();

}



// تجهيز التعديل
function editCategory(id,name){

document.getElementById("description_cat").value=name;

edit_id=id;

}



// حذف
async function deleteCategory(id){

if(!confirm("هل تريد حذف الصنف؟")) return;

await supabaseClient
.from("categories")
.delete()
.eq("id_cat",id);

loadCategories();

}



// خروج
function logout(){

window.location.href="index.html";

}



// تشغيل الصفحة
loadCategories();

</script>

</body>
</html>
