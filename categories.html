<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>إدارة الأصناف</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable"></script>
<script src="https://cdn.jsdelivr.net/npm/arabic-persian-reshaper/js/arabic-persian-reshaper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bidi-js/dist/bidi.min.js"></script>
<style>

body{
font-family:Tahoma;
background:#f4f6f9;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:15px;
}

input{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
}

.search{
margin-top:10px;
background:#fafafa;
}

button{
padding:8px 15px;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

.save{background:#28a745;color:white;}
.edit{background:#ffc107;}
.delete{background:#dc3545;color:white;}
.logout{background:#333;color:white;float:left}

table{
width:100%;
margin-top:15px;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#007bff;
color:white;
}

tr:hover{
background:#f1f1f1;
}

.message{
text-align:center;
margin-top:10px;
color:green;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<button class="logout" onclick="logout()">خروج</button>
<button onclick="history.back()" class="bg-gray-600 text-white p-4 rounded shadow">
رجوع
</button>
<h2>إدارة الأصناف</h2>

<input type="text" id="description_cat" placeholder="اسم الصنف">

<button class="save" onclick="saveCategory()">حفظ</button>
<button onclick="exportPDF()">تصدير PDF</button>
<input type="text" id="searchBox" class="search" placeholder="بحث عن صنف..." onkeyup="searchCategory()">

<div class="message" id="msg"></div>

<table>

<thead>
<tr>
<th>الرقم</th>
<th>الصنف</th>
<th>تعديل</th>
<th>حذف</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<script>

const supabaseClient = window.supabase.createClient(
"https://vmxbedovoahuggfpcmyk.supabase.co",
"sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU"
)

let edit_id=null
let categories=[]


// تحميل الأصناف
async function loadCategories(){

const {data,error}=await supabaseClient
.from("categories")
.select("*")
.order("id_cat",{ascending:true})

categories=data

renderTable(categories)

}


// عرض الجدول
function renderTable(list){

let html=""

list.forEach(function(row){

html+=`

<tr>

<td>${row.id_cat}</td>

<td>${row.description_cat}</td>

<td>
<button class="edit"
onclick="editCategory(${row.id_cat},'${row.description_cat}')">
تعديل
</button>
</td>

<td>
<button class="delete"
onclick="deleteCategory(${row.id_cat})">
حذف
</button>
</td>

</tr>

`

})

document.getElementById("tableBody").innerHTML=html

}


// حفظ
async function saveCategory(){

let name=document.getElementById("description_cat").value

if(name==""){
alert("اكتب اسم الصنف")
return
}

if(edit_id==null){

await supabaseClient
.from("categories")
.insert([{description_cat:name}])

showMsg("تمت إضافة الصنف")

}else{

await supabaseClient
.from("categories")
.update({description_cat:name})
.eq("id_cat",edit_id)

showMsg("تم تعديل الصنف")

edit_id=null

}

document.getElementById("description_cat").value=""

loadCategories()

}


// تعديل
function editCategory(id,name){

document.getElementById("description_cat").value=name

edit_id=id

}


// حذف
async function deleteCategory(id){

if(!confirm("تأكيد الحذف؟")) return

await supabaseClient
.from("categories")
.delete()
.eq("id_cat",id)

showMsg("تم حذف الصنف")

loadCategories()

}


// بحث
function searchCategory(){

let word=document.getElementById("searchBox").value.toLowerCase()

let filtered=categories.filter(c =>
c.description_cat.toLowerCase().includes(word)
)

renderTable(filtered)

}


// رسالة
function showMsg(text){

document.getElementById("msg").innerText=text

setTimeout(()=>{

document.getElementById("msg").innerText=""

},2000)

}


// خروج
function logout(){

window.location.href="index.html"

}


loadCategories()
function exportPDF(){

const { jsPDF } = window.jspdf

let doc = new jsPDF()

let rows=[]

categories.forEach(function(cat){

let name = cat.description_cat

name = ArabicPersianReshaper.reshape(name)
name = bidi_js(name)

rows.push([
cat.id_cat,
name
])

})

let title="كشف الأصناف"

title = ArabicPersianReshaper.reshape(title)
title = bidi_js(title)

doc.text(title, 90, 10)

doc.autoTable({
head:[["الرقم","الصنف"]],
body:rows,
startY:20
})

doc.save("categories.pdf")

}
</script>

</body>
</html>
