<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إعدادات المتجر</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex justify-center items-center min-h-screen p-4">

<div class="bg-white p-6 sm:p-8 rounded shadow w-full max-w-md">

  <h2 class="text-xl font-bold mb-6 text-center">إعدادات المتجر</h2>

  <label class="block mb-1 font-semibold">اسم المتجر</label>
  <input id="storeNameInput" class="w-full border p-2 mb-4 rounded" placeholder="أدخل اسم المتجر">

  <label class="block mb-1 font-semibold">الترويسة</label>
  <input id="storeHeaderInput" class="w-full border p-2 mb-6 rounded" placeholder="أدخل الترويسة">

  <button onclick="saveSettings()" class="bg-blue-500 hover:bg-blue-600 text-white w-full p-3 rounded font-semibold">
    حفظ
  </button>

</div>

<script>
function loadSettings() {
  document.getElementById("storeNameInput").value = localStorage.getItem("storeName") || "";
  document.getElementById("storeHeaderInput").value = localStorage.getItem("storeHeader") || "";
}

function saveSettings() {
  localStorage.setItem("storeName", document.getElementById("storeNameInput").value);
  localStorage.setItem("storeHeader", document.getElementById("storeHeaderInput").value);
  alert("تم الحفظ");
  window.location = "admin.html";
}

loadSettings();
</script>

</body>
</html>
