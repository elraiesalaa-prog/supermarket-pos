<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>إعدادات المتجر</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex justify-center items-center h-screen">

<div class="bg-white p-8 rounded shadow w-96">

<h2 class="text-xl font-bold mb-4 text-center">
إعدادات المتجر
</h2>

<label>اسم المتجر</label>

<input id="storeNameInput"
class="w-full border p-2 mb-4">

<label>الترويسة</label>

<input id="storeHeaderInput"
class="w-full border p-2 mb-4">

<button onclick="saveSettings()"
class="bg-blue-500 text-white w-full p-2 rounded">
حفظ
</button>

</div>


<script>

function loadSettings(){

document.getElementById("storeNameInput").value =
localStorage.getItem("storeName") || "";

document.getElementById("storeHeaderInput").value =
localStorage.getItem("storeHeader") || "";

}

function saveSettings(){

localStorage.setItem(
"storeName",
document.getElementById("storeNameInput").value
);

localStorage.setItem(
"storeHeader",
document.getElementById("storeHeaderInput").value
);

alert("تم الحفظ");

window.location="admin.html";

}

loadSettings();

</script>

</body>
</html>
