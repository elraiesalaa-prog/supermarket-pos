<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>لوحة المشرف التقني</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/feather-icons"></script>

<style>

body{
background:linear-gradient(135deg,#1e3a8a,#0f172a);
font-family:tahoma;
margin:0;
overflow:hidden; /* ✅ منع كسر التصميم */
}

.menu{
padding:10px;
margin-bottom:6px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
background:#3b82f6;
color:white;
font-weight:bold;
text-align:center;
}

.menu:hover{
background:#2563eb;
transform:translateX(-4px);
}

.panel{
background:white;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.topbar{
background:#0f172a;
color:white;
padding:10px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.scroll{
overflow:auto;
}

</style>

</head>

<body>

<!-- ✅ هيدر ثابت -->
<div class="bg-blue-700 text-white p-3 flex justify-between items-center sticky top-0 z-50">

<div class="text-xl font-bold">
<span id="storeHeader">نظام إدارة المبيعات</span>
</div>

<div>
🏪 <span id="storeName">ABM للتجارة والاستثمار</span>
</div>

</div>

<div class="bg-blue-500 text-white flex gap-4 p-2 justify-center flex-wrap">

<button onclick="go('backup.html')" class="px-4 py-1 bg-blue-600 rounded">
إنشاء نسخة احتياطية
</button>

<button onclick="go('restore.html')" class="px-4 py-1 bg-blue-600 rounded">
استعادة نسخة احتياطية
</button>

<div class="menu" onclick="go('settings.html')">⚙ إعدادات المتجر</div>

</div>

<!-- الشريط العلوي -->
<div class="topbar">

<div>
👤 مرحبا :
<span id="usernameDisplay"></span>
</div>

<div id="clock"></div>

<div class="menu" onclick="editPassword()">تعديل كلمة المرور</div>

</div>

<!-- ✅ محتوى رئيسي مع Scroll -->
<div class="flex h-[calc(100vh-120px)]">

<!-- القائمة اليمنى -->
<div class="w-64 p-4 scroll text-white"
style="background:linear-gradient(to bottom,#60a5fa,#3b82f6);">

<h2 class="text-xl font-bold text-center mb-4 text-blue-700">
القائمة الرئيسية
</h2>

<div class="menu" onclick="go('tb_users.html')">إدارة المستخدمين</div>

<hr>

</div>

<!-- الوسط -->
<div class="flex-1 flex items-center justify-center p-6 scroll">

<div class="bg-white rounded-xl shadow-2xl p-6 w-full h-full flex items-center justify-center">

<img src="pic.png"
loading="lazy"
style="max-width:100%; max-height:100%; object-fit:contain;">

</div>

</div>

<!-- القائمة اليسرى -->
<div class="w-64 p-4 scroll text-white"
style="background:linear-gradient(to bottom,#60a5fa,#3b82f6);">

<h2 class="text-xl font-bold text-center mb-4 text-blue-700">
العمليات
</h2>

<hr>

<div class="menu" style="background-color:#ef4444;" onclick="logout()">خروج</div>

</div>

</div>

<!-- ✅ نافذة تغيير كلمة المرور محسنة -->
<div id="passwordBox" style="display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
width:320px;
z-index:999">

<h3 style="text-align:center;margin-bottom:10px;">تغيير كلمة المرور</h3>

<input type="password" id="oldPass" placeholder="كلمة المرور القديمة" style="width:100%;padding:8px;margin:5px 0">
<input type="password" id="newPass" placeholder="كلمة المرور الجديدة" style="width:100%;padding:8px;margin:5px 0">

<div style="display:flex;gap:5px;margin-top:10px;">
<button onclick="savePassword()" style="flex:1;background:#16a34a;color:white;padding:8px;border:none;border-radius:6px">حفظ</button>
<button onclick="closePassword()" style="flex:1;background:#6b7280;color:white;padding:8px;border:none;border-radius:6px">إلغاء</button>
</div>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://vmxbedovoahuggfpcmyk.supabase.co",
"sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU"
)

function go(page){
window.location.href = page
}

function loadStore(){

let name = localStorage.getItem("storeName")
let header = localStorage.getItem("storeHeader")

if(!name){
name="ABM للتجارة والاستثمار"
localStorage.setItem("storeName",name)
}

if(!header){
header="نظام إدارة المبيعات"
localStorage.setItem("storeHeader",header)
}

document.getElementById("storeName").innerText=name
document.getElementById("storeHeader").innerText=header

}

loadStore()

function updateClock(){

let now = new Date()

let time = now.toLocaleTimeString()
let date = now.toLocaleDateString()

document.getElementById("clock").innerHTML =
"🕒 " + time + " | " + date

}

setInterval(updateClock,1000)
updateClock()

document.addEventListener("DOMContentLoaded", function(){

let user = localStorage.getItem("user")

if(!user){
window.location="index.html"
return
}

document.getElementById("usernameDisplay").textContent = user

})

function logout(){

localStorage.removeItem("user")
localStorage.removeItem("role")

window.location="index.html"

}

function editPassword(){
document.getElementById("passwordBox").style.display="block"
}

function closePassword(){
document.getElementById("passwordBox").style.display="none"
}

async function savePassword(){

let username = localStorage.getItem("user")
let oldPass = document.getElementById("oldPass").value
let newPass = document.getElementById("newPass").value

if(!oldPass || !newPass){
alert("أدخل جميع البيانات")
return
}

const {data,error}=await supabaseClient
.from("tb_users")
.select("*")
.eq("fullname",username)
.eq("pwd",oldPass)
.single()

if(error || !data){
alert("كلمة المرور القديمة غير صحيحة")
return
}

const {error:updateError}=await supabaseClient
.from("tb_users")
.update({pwd:newPass})
.eq("fullname",username)

if(updateError){
alert("حدث خطأ أثناء التحديث")
return
}

alert("تم تغيير كلمة المرور بنجاح")

closePassword()

}

</script>

</body>
</html>
