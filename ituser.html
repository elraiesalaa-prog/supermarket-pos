<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة المشرف التقني</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/feather-icons"></script>
</head>

<body class="bg-gradient-to-br from-blue-900 to-blue-950 font-tahoma overflow-hidden">

<!-- هيدر ثابت -->
<div class="sticky top-0 z-50 bg-blue-700 text-white p-3 flex flex-col md:flex-row justify-between items-center">
  <div class="text-xl font-bold mb-1 md:mb-0" id="storeHeader">نظام إدارة المبيعات</div>
  <div>🏪 <span id="storeName">ABM للتجارة والاستثمار</span></div>
</div>

<!-- شريط الإجراءات العلوي -->
<div class="bg-blue-500 text-white flex flex-wrap justify-center gap-2 p-2">
  <button onclick="go('backup.html')" class="px-4 py-1 bg-blue-600 rounded">إنشاء نسخة احتياطية</button>
  <button onclick="go('restore.html')" class="px-4 py-1 bg-blue-600 rounded">استعادة نسخة احتياطية</button>
  <div class="menu cursor-pointer px-4 py-1 bg-blue-600 rounded" onclick="go('settings.html')">⚙ إعدادات المتجر</div>
</div>

<!-- الشريط العلوي الثاني -->
<div class="topbar bg-gray-900 text-white flex flex-wrap justify-between items-center p-3 gap-2">
  <div>👤 مرحبا: <span id="usernameDisplay"></span></div>
  <div id="clock"></div>
  <div class="menu cursor-pointer bg-blue-600 px-3 py-1 rounded" onclick="editPassword()">تعديل كلمة المرور</div>
</div>

<!-- المحتوى الرئيسي -->
<div class="flex flex-col md:flex-row h-[calc(100vh-160px)]">

  <!-- القائمة اليمنى -->
  <div class="w-full md:w-64 p-4 overflow-auto text-white bg-gradient-to-b from-blue-400 to-blue-600">
    <h2 class="text-xl font-bold text-center mb-4 text-blue-700">القائمة الرئيسية</h2>
    <div class="menu cursor-pointer mb-2 bg-blue-600 px-3 py-1 rounded" onclick="go('tb_users.html')">إدارة المستخدمين</div>
    <hr class="my-2 border-blue-200">
  </div>

  <!-- الوسط -->
  <div class="flex-1 flex items-center justify-center p-2 overflow-auto">
    <div class="bg-white rounded-xl shadow-2xl p-4 w-full h-full flex items-center justify-center">
      <img src="pic.png" loading="lazy" class="max-w-full max-h-full object-contain">
    </div>
  </div>

  <!-- القائمة اليسرى -->
  <div class="w-full md:w-64 p-4 overflow-auto text-white bg-gradient-to-b from-blue-400 to-blue-600">
    <h2 class="text-xl font-bold text-center mb-4 text-blue-700">العمليات</h2>
    <div class="menu cursor-pointer bg-red-500 px-3 py-1 rounded" onclick="logout()">خروج</div>
  </div>

</div>

<!-- نافذة تغيير كلمة المرور -->
<div id="passwordBox" class="hidden fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-white p-6 rounded-lg shadow-lg w-11/12 max-w-sm z-50">
  <h3 class="text-center mb-3 font-bold">تغيير كلمة المرور</h3>
  <input type="password" id="oldPass" placeholder="كلمة المرور القديمة" class="w-full p-2 mb-2 border rounded">
  <input type="password" id="newPass" placeholder="كلمة المرور الجديدة" class="w-full p-2 mb-2 border rounded">
  <div class="flex gap-2 mt-3">
    <button onclick="savePassword()" class="flex-1 bg-green-600 text-white rounded p-2">حفظ</button>
    <button onclick="closePassword()" class="flex-1 bg-gray-500 text-white rounded p-2">إلغاء</button>
  </div>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://vmxbedovoahuggfpcmyk.supabase.co",
  "sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU"
);

function go(page){ window.location.href = page }

function loadStore(){
  let name = localStorage.getItem("storeName") || "ABM للتجارة والاستثمار";
  let header = localStorage.getItem("storeHeader") || "نظام إدارة المبيعات";
  localStorage.setItem("storeName", name);
  localStorage.setItem("storeHeader", header);
  document.getElementById("storeName").innerText = name;
  document.getElementById("storeHeader").innerText = header;
}

loadStore();

function updateClock(){
  let now = new Date();
  document.getElementById("clock").innerHTML = "🕒 " + now.toLocaleTimeString() + " | " + now.toLocaleDateString();
}
setInterval(updateClock,1000);
updateClock();

document.addEventListener("DOMContentLoaded", function(){
  let user = localStorage.getItem("user");
  if(!user){ window.location="index.html"; return; }
  document.getElementById("usernameDisplay").textContent = user;
});

function logout(){
  localStorage.removeItem("user");
  localStorage.removeItem("role");
  window.location="index.html";
}

function editPassword(){ document.getElementById("passwordBox").classList.remove("hidden") }
function closePassword(){ document.getElementById("passwordBox").classList.add("hidden") }

async function savePassword(){
  let username = localStorage.getItem("user");
  let oldPass = document.getElementById("oldPass").value;
  let newPass = document.getElementById("newPass").value;
  if(!oldPass || !newPass){ alert("أدخل جميع البيانات"); return; }

  const {data,error} = await supabaseClient.from("tb_users").select("*").eq("fullname",username).eq("pwd",oldPass).single();
  if(error || !data){ alert("كلمة المرور القديمة غير صحيحة"); return; }

  const {error:updateError} = await supabaseClient.from("tb_users").update({pwd:newPass}).eq("fullname",username);
  if(updateError){ alert("حدث خطأ أثناء التحديث"); return; }

  alert("تم تغيير كلمة المرور بنجاح");
  closePassword();
}
</script>

</body>
</html>
