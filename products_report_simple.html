<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>تقرير المنتجات</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 p-4">

<div class="max-w-6xl mx-auto bg-white p-4 rounded shadow">

<h2 class="text-xl font-bold mb-4 text-center">تقرير المنتجات</h2>

<table class="w-full border text-center">
<thead class="bg-gray-200">
<tr>
<th class="border p-2">اسم المنتج</th>
<th class="border p-2">تكلفة المنتج</th>
<th class="border p-2">سعر بيع الوحدة</th>
<th class="border p-2">ربح الوحدة</th>
<th class="border p-2">ربح المنتج</th>
</tr>
</thead>

<tbody id="reportTable"></tbody>

</table>

</div>

<script>

// ✅ بيانات Supabase
const supabaseUrl = "https://vmxbedovoahuggfpcmyk.supabase.co";
const supabaseKey = "sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

// 🔹 تشغيل بعد تحميل الصفحة
document.addEventListener("DOMContentLoaded", () => {
  loadReport();
});

// 🔹 جلب البيانات من VIEW
async function loadReport() {

  const { data, error } = await supabaseClient
    .from("products_repo")
    .select('*');

  if (error) {
    alert("خطأ في جلب البيانات");
    console.error(error);
    return;
  }

  const table = document.getElementById("reportTable");
  table.innerHTML = "";

  if (!data || data.length === 0) {
    table.innerHTML = `
      <tr>
        <td colspan="5" class="p-4 text-gray-500">لا توجد بيانات</td>
      </tr>
    `;
    return;
  }

  let rows = "";

  data.forEach(row => {
    rows += `
      <tr class="hover:bg-gray-50">
        <td class="border p-2">${row["اسم المنتج"] ?? ""}</td>
        <td class="border p-2">${formatNumber(row["تكلفة المنتج"])}</td>
        <td class="border p-2">${formatNumber(row["سعر بيع الوحدة"])}</td>
        <td class="border p-2 text-green-600">${formatNumber(row["ربح الوحدة"])}</td>
        <td class="border p-2 text-blue-600">${formatNumber(row["ربح المنتج"])}</td>
      </tr>
    `;
  });

  table.innerHTML = rows;
}

// 🔹 تنسيق الأرقام (آمن 100%)
function formatNumber(value) {
  if (value === null || value === undefined || value === "") return "0";

  // رقم جاهز
  if (typeof value === "number") {
    return value.toLocaleString('ar-EG', {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });
  }

  // نص رقمي
  const parsed = parseFloat(value);
  if (!isNaN(parsed)) {
    return parsed.toLocaleString('ar-EG', {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });
  }

  // قيمة غير رقمية
  return value;
}

</script>

</body>
</html>
