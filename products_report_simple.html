<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<title>تفاصيل المنتجات</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-blue-50 p-6">

<div class="max-w-6xl mx-auto bg-white shadow-xl rounded-xl p-6">

<h1 class="text-3xl font-bold text-center text-blue-700 mb-6">
تفاصيل المنتجات
</h1>

<div class="mb-4 text-left">
<button onclick="printPDF()" 
class="bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded-lg shadow-md">
🖨️ طباعة PDF
</button>
</div>

<div class="mb-4">
<input id="searchInput" type="text"
placeholder="بحث باسم المنتج..."
class="w-full border px-3 py-2 rounded">
</div>

<div class="overflow-auto">
<table class="w-full border text-center">

<thead class="bg-blue-600 text-white">
<tr>
<th class="p-2">اسم المنتج</th>
<th class="p-2">تكلفة المنتج</th>
<th class="p-2">سعر البيع</th>
<th class="p-2">ربح الوحدة</th>
<th class="p-2">ربح المنتج</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>
</div>

</div>

<script>

// ================== Supabase ==================
const supabaseUrl = "https://vmxbedovoahuggfpcmyk.supabase.co";
const supabaseKey = "sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let reportData = [];

// ================== تحميل البيانات ==================
async function loadReport() {

const { data, error } = await supabaseClient
.from("products_any_report") // ✅ تم التعديل هنا
.select("*");

if (error) {
console.error(error);
alert("خطأ: " + error.message);
return;
}

reportData = data || [];
renderTable();

}

// ================== عرض البيانات ==================
function renderTable() {

const search = document.getElementById("searchInput").value.toLowerCase();

let table = "";

reportData
.filter(row =>
(row["اسم المنتج"] || "").toLowerCase().includes(search)
)
.forEach(row => {

table += `
<tr class="border">
<td>${row["اسم المنتج"] ?? ""}</td>
<td>${formatNumber(row["تكلفة المنتج"])}</td>
<td>${formatNumber(row["سعر بيع الوحدة"])}</td>
<td>${formatNumber(row["ربح الوحدة"])}</td>
<td class="font-bold text-green-600">
${formatNumber(row["ربح المنتج"])}
</td>
</tr>
`;

});

document.getElementById("tableBody").innerHTML = table;

}

// ================== البحث ==================
document.getElementById("searchInput")
.addEventListener("input", renderTable);

// تشغيل
loadReport();


// ================== تنسيق الأرقام ==================
function formatNumber(value) {
if (value === null || value === undefined || value === "") return "0";

const num = parseFloat(value);
if (!isNaN(num)) {
return num.toLocaleString('ar-EG', {
minimumFractionDigits: 2,
maximumFractionDigits: 2
});
}

return value;
}


// ================== PDF ==================
window.printPDF = async function () {

const { data, error } = await supabaseClient
.from('products_any_report') // ✅ تم التعديل هنا
.select('*');

if (error) {
alert("خطأ في تحميل البيانات");
return;
}

const container = document.createElement("div");
container.setAttribute("dir", "rtl");
container.style.fontFamily = "Tahoma";
container.style.padding = "10px";

const title = document.createElement("h2");
title.innerText = "تقرير المنتجات";
title.style.textAlign = "center";
title.style.marginBottom = "15px";
container.appendChild(title);

const table = document.createElement("table");
table.style.width = "100%";
table.style.borderCollapse = "collapse";
table.style.textAlign = "center";
table.style.fontSize = "12px";

const headers = [
"اسم المنتج",
"تكلفة المنتج",
"سعر بيع الوحدة",
"ربح الوحدة",
"ربح المنتج"
];

let html = "<thead><tr>";

headers.forEach(h => {
html += `
<th style="border:1px solid #000;padding:6px;background:#007bff;color:#fff;">
${h}
</th>`;
});

html += "</tr></thead><tbody>";

data.forEach(r => {
html += `
<tr>
<td style="border:1px solid #000;padding:5px;">${r["اسم المنتج"]}</td>
<td style="border:1px solid #000;padding:5px;">${formatNumber(r["تكلفة المنتج"])}</td>
<td style="border:1px solid #000;padding:5px;">${formatNumber(r["سعر بيع الوحدة"])}</td>
<td style="border:1px solid #000;padding:5px;">${formatNumber(r["ربح الوحدة"])}</td>
<td style="border:1px solid #000;padding:5px;color:green;font-weight:bold;">
${formatNumber(r["ربح المنتج"])}
</td>
</tr>
`;
});

html += "</tbody>";

table.innerHTML = html;
container.appendChild(table);

// إجمالي الأرباح (مصَحح)
let total = data.reduce((sum, r) => {
let val = parseFloat(r["ربح المنتج"]);
return sum + (isNaN(val) ? 0 : val);
}, 0);

const totalDiv = document.createElement("div");
totalDiv.innerText = "إجمالي الأرباح: " + formatNumber(total);
totalDiv.style.textAlign = "right";
totalDiv.style.marginTop = "15px";
totalDiv.style.fontWeight = "bold";

container.appendChild(totalDiv);

const opt = {
margin: 0.5,
filename: "تقرير_المنتجات.pdf",
image: { type: "jpeg", quality: 1 },
html2canvas: { scale: 3 },
jsPDF: { unit: "cm", format: "a4", orientation: "landscape" }
};

html2pdf().set(opt).from(container).save();

};

</script>

</body>
</html>
