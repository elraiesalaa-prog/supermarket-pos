<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة المشرف</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/feather-icons"></script>

<style>
body{
  background:linear-gradient(135deg,#1e3a8a,#0f172a);
  font-family:tahoma;
}
.menu{
  padding:10px;
  margin-bottom:6px;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
  background:#3b82f6;
  color:white;
  font-weight:bold;
}
.menu:hover{
  background:#2563eb;
  transform:translateX(-4px);
}
.panel{
  background:white;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
.topbar{
  background:#0f172a;
  color:white;
  padding:10px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
</style>
</head>

<body>

<!-- رأس الصفحة -->
<div class="bg-blue-700 text-white p-3 flex justify-between items-center">
  <div class="text-xl font-bold"><span id="storeHeader">نظام إدارة المبيعات</span></div>
  <div>🏪 <span id="storeName">ABM للتجارة والاستثمار</span></div>
</div>

<div class="bg-blue-500 text-white flex gap-2 p-2 justify-center flex-wrap">
  <button onclick="go('sales_advanced.html')" class="px-4 py-1 bg-blue-600 rounded">فواتير مبدئية</button>
  <button onclick="go('sales_advanced.html')" class="px-4 py-1 bg-blue-600 rounded">فواتير نهائية</button>
</div>

<!-- الشريط العلوي -->
<div class="topbar">
  <div>👤 مرحبا : <span id="usernameDisplay"></span></div>
  <div id="clock"></div>
  <div class="menu" onclick="editPassword()">تعديل كلمة المرور</div>
</div>

<!-- الحاوية الرئيسية -->
<div class="flex flex-col lg:flex-row h-[calc(100vh-110px)] overflow-hidden">

  <!-- القائمة اليمنى -->
  <div class="w-full lg:w-64 p-4 overflow-y-auto text-white flex-shrink-0"
       style="background:linear-gradient(to bottom,#60a5fa,#3b82f6);">
    <h2 class="text-xl font-bold text-center mb-4 text-blue-700">القائمة الرئيسية</h2>
    <div class="menu" onclick="go('categories.html')">الأصناف</div>
    <div class="menu" onclick="go('products.html')">المنتجات</div>
    <div class="menu" onclick="go('customers.html')">العملاء</div>
    <div class="menu" onclick="go('importer.html')">الموردين</div>
    <hr>
    <div class="menu" onclick="go('loans.html')">القروض</div>
    <hr>
    <div class="menu" onclick="go('loan_statement.html')">سداد القروض</div>
    <hr>
    <div class="menu" onclick="go('coast_value.html')">المصروفات</div>
  </div>

  <!-- الوسط -->
  <div class="flex-1 flex items-center justify-center p-4 overflow-auto">
    <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-3xl flex items-center justify-center">
      <img src="pic14.webp" loading="lazy" style="max-width:100%; max-height:100%; object-fit:contain;">
    </div>
  </div>

  <!-- القائمة اليسرى -->
  <div class="w-full lg:w-64 p-4 overflow-y-auto text-white flex-shrink-0"
       style="background:linear-gradient(to bottom,#60a5fa,#3b82f6);">
    <h2 class="text-xl font-bold text-center mb-4 text-blue-700">العمليات</h2>
    <div class="menu" onclick="go('sales_advanced.html')">المبيعات</div>
    <div class="menu" onclick="go('profits_report.html')">أرباح الطلبيات</div>
    <hr>
    <div class="menu" onclick="go('products_weight_report.html')">اوزان المنتجات</div>
    <div class="menu" onclick="go('weight_kg.html')"> </div>
    <div class="menu" onclick="go('weight_lb.html')"> </div>
    <hr>
    <div class="menu bg-red-500 text-center" onclick="logout()">خروج</div>
  </div>

</div>

<!-- نافذة تغيير كلمة المرور -->
<div id="passwordBox" class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-30 hidden">
  <div class="bg-white p-6 rounded shadow w-11/12 max-w-xs">
    <h3 class="text-lg font-bold mb-4">تغيير كلمة المرور</h3>
    <input type="password" id="oldPass" placeholder="كلمة المرور القديمة" class="w-full border p-2 mb-3 rounded">
    <input type="password" id="newPass" placeholder="كلمة المرور الجديدة" class="w-full border p-2 mb-4 rounded">
    <div class="flex justify-between">
      <button onclick="savePassword()" class="bg-blue-500 text-white px-4 py-2 rounded">حفظ</button>
      <button onclick="closePassword()" class="bg-gray-400 text-white px-4 py-2 rounded">إلغاء</button>
    </div>
  </div>
</div>

<script>
const supabaseClient = supabase.createClient(
"https://vmxbedovoahuggfpcmyk.supabase.co",
"sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU"
);

function loadStore(){
  let name = localStorage.getItem("storeName") || "ABM للتجارة والاستثمار";
  let header = localStorage.getItem("storeHeader") || "نظام إدارة المبيعات";
  document.getElementById("storeName").innerText = name;
  document.getElementById("storeHeader").innerText = header;
}
function go(page){ window.location.href = page; }

function updateClock(){
  let now = new Date();
  document.getElementById("clock").innerHTML = "🕒 " + now.toLocaleTimeString() + " | " + now.toLocaleDateString();
}
setInterval(updateClock,1000); updateClock();

document.addEventListener("DOMContentLoaded", function(){
  let user = localStorage.getItem("user");
  if(!user){ window.location="index.html"; return; }
  document.getElementById("usernameDisplay").textContent = user;
});

function logout(){
  localStorage.removeItem("user"); localStorage.removeItem("role");
  window.location="index.html";
}
function editPassword(){ document.getElementById("passwordBox").classList.remove("hidden"); }
function closePassword(){ document.getElementById("passwordBox").classList.add("hidden"); }

async function savePassword(){
  let username = localStorage.getItem("user");
  let oldPass = document.getElementById("oldPass").value;
  let newPass = document.getElementById("newPass").value;
  if(!oldPass || !newPass){ alert("أدخل جميع البيانات"); return; }

  const {data,error} = await supabaseClient
    .from("tb_users").select("*")
    .eq("fullname",username).eq("pwd",oldPass).single();

  if(error || !data){ alert("كلمة المرور القديمة غير صحيحة"); return; }

  const {error:updateError} = await supabaseClient
    .from("tb_users").update({pwd:newPass})
    .eq("fullname",username);

  if(updateError){ alert("حدث خطأ أثناء التحديث"); return; }

  alert("تم تغيير كلمة المرور بنجاح");
  closePassword();
}

loadStore();
</script>

</body>
</html>
