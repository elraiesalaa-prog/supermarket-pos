<div class="w-64 p-4 overflow-y-auto text-white"
style="background:linear-gradient(to bottom,#60a5fa,#3b82f6);">

العمليات

<div class="menu" onclick="go('sales_advanced.html')">المبيعات</div>

<!-- نافذة تغيير كلمة المرور -->

<div id="passwordBox" style="display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
width:300px">

<h3>تغيير كلمة المرور</h3>

<input type="password" id="oldPass" placeholder="كلمة المرور القديمة">
<input type="password" id="newPass" placeholder="كلمة المرور الجديدة">

<br><br>

<button onclick="savePassword()">حفظ</button>
<button onclick="closePassword()">إلغاء</button>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://vmxbedovoahuggfpcmyk.supabase.co",
"sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU"
)

function loadStore(){

let name = localStorage.getItem("storeName")
let header = localStorage.getItem("storeHeader")

if(!name){
name="ABM للتجارة والاستثمار"
localStorage.setItem("storeName",name)
}

if(!header){
header="نظام إدارة المبيعات"
localStorage.setItem("storeHeader",header)
}

document.getElementById("storeName").innerText=name
document.getElementById("storeHeader").innerText=header

}

loadStore()

function updateClock(){

let now = new Date()

let time = now.toLocaleTimeString()
let date = now.toLocaleDateString()

document.getElementById("clock").innerHTML =
"🕒 " + time + " | " + date

}

setInterval(updateClock,1000)
updateClock()

document.addEventListener("DOMContentLoaded", function(){

let user = localStorage.getItem("user")

if(!user){
window.location="index.html"
return
}

document.getElementById("usernameDisplay").textContent = user

})

function logout(){

localStorage.removeItem("user")
localStorage.removeItem("role")

window.location="index.html"

}

function editPassword(){
document.getElementById("passwordBox").style.display="block"
}

function closePassword(){
document.getElementById("passwordBox").style.display="none"
}

async function savePassword(){

let username = localStorage.getItem("user")
let oldPass = document.getElementById("oldPass").value
let newPass = document.getElementById("newPass").value

if(!oldPass || !newPass){
alert("أدخل جميع البيانات")
return
}

const {data,error}=await supabaseClient
.from("tb_users")
.select("*")
.eq("fullname",username)
.eq("pwd",oldPass)
.single()

if(error || !data){
alert("كلمة المرور القديمة غير صحيحة")
return
}

const {error:updateError}=await supabaseClient
.from("tb_users")
.update({pwd:newPass})
.eq("fullname",username)

if(updateError){
alert("حدث خطأ أثناء التحديث")
return
}

alert("تم تغيير كلمة المرور بنجاح")

closePassword()

}

</script>
