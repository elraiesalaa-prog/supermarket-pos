// هنا تضيف دالة تحديث المنتجات حسب المصروفات
async function updateProductCosts() {
  const { data: coasts, error: coastError } = await supabaseClient
    .from("coasts")
    .select("req_id, coast_value");

  if (coastError) return alert(coastError.message);

  const coastTotals = {};
  coasts.forEach(c => {
    if (!coastTotals[c.req_id]) coastTotals[c.req_id] = 0;
    coastTotals[c.req_id] += Number(c.coast_value);
  });

  for (const req_id in coastTotals) {
    const totalCost = coastTotals[req_id];

    const { data: products, error: prodError } = await supabaseClient
      .from("products")
      .select("product_num, coast_value")
      .eq("req_id", req_id);

    if (prodError) {
      console.error(`خطأ في جلب المنتجات للطلبية ${req_id}: ${prodError.message}`);
      continue;
    }

    const productCount = products.length;
    if (productCount === 0) continue;

    const perProductCost = totalCost / productCount;

    for (const product of products) {
      const newCost = (product.coast_value || 0) + perProductCost;
      const { error: updateError } = await supabaseClient
        .from("products")
        .update({ coast_value: newCost })
        .eq("product_num", product.product_num);

      if (updateError) {
        console.error(`خطأ في تحديث المنتج ${product.product_num}: ${updateError.message}`);
      }
    }
  }

  alert("تم تحديث تكلفة المصروفات لكل المنتجات بنجاح!");
}
