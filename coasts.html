<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>إدارة المصروفات</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-r from-blue-50 to-blue-100 min-h-screen p-6">

<div class="max-w-5xl mx-auto bg-white shadow-xl rounded-xl p-6">

<h1 class="text-3xl font-bold text-center text-blue-700 mb-6">
إدارة المصروفات
</h1>

<!-- نموذج الإضافة -->

<div class="grid grid-cols-2 gap-4 mb-6">

<div>
<label class="font-bold">القيمة</label>
<input id="coast_value" type="number" class="w-full border rounded p-2">
</div>

<div>
<label class="font-bold">نوع المنصرف</label>

<select id="c_type" class="w-full border rounded p-2">

<option value="تكلفة منتجات">تكلفة منتجات</option>

<option value="منصرفات محلية">منصرفات محلية</option>

<option value="تكاليف اخرى">تكاليف اخرى</option>

</select>

</div>

<div class="col-span-2">
<label class="font-bold">البيان</label>
<input id="coast_discription" type="text" class="w-full border rounded p-2">
</div>

<div>
<label class="font-bold">التاريخ</label>
<input id="co_date" type="date" class="w-full border rounded p-2">
</div>

</div>

<div class="flex gap-3 mb-6">

<button onclick="addCoast()" 
class="bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded">
إضافة
</button>

<button onclick="updateCoast()" 
class="bg-yellow-500 hover:bg-yellow-600 text-white px-5 py-2 rounded">
تعديل
</button>

<button onclick="clearForm()" 
class="bg-gray-500 hover:bg-gray-600 text-white px-5 py-2 rounded">
جديد
</button>

<a href="index.html" 
class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded">
رجوع
</a>

</div>

<!-- جدول البيانات -->

<div class="overflow-auto">

<table class="w-full border text-center">

<thead class="bg-blue-600 text-white">

<tr>

<th class="p-2">رقم</th>
<th class="p-2">القيمة</th>
<th class="p-2">النوع</th>
<th class="p-2">البيان</th>
<th class="p-2">التاريخ</th>
<th class="p-2">تعديل</th>
<th class="p-2">حذف</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

<script>

const supabaseUrl = "https://vmxbedovoahuggfpcmyk.supabase.co";
const supabaseKey = "sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let editID=null;

async function loadCoasts(){

const {data,error}=await supabaseClient
.from("coasts")
.select("*")
.order("coast_id",{ascending:false});

let table="";

data.forEach(row=>{

table+=`

<tr class="border">

<td>${row.coast_id}</td>

<td>${row.coast_value}</td>

<td>${row.c_type}</td>

<td>${row.coast_discription ?? ""}</td>

<td>${row.co_date}</td>

<td>

<button onclick="editRow(${row.coast_id})"
class="bg-yellow-400 px-3 py-1 rounded">

تعديل

</button>

</td>

<td>

<button onclick="deleteRow(${row.coast_id})"
class="bg-red-600 text-white px-3 py-1 rounded">

حذف

</button>

</td>

</tr>

`;

});

document.getElementById("tableBody").innerHTML=table;

}

async function addCoast(){

const value=document.getElementById("coast_value").value;
const type=document.getElementById("c_type").value;
const desc=document.getElementById("coast_discription").value;
const date=document.getElementById("co_date").value;

const {error}=await supabaseClient
.from("coasts")
.insert([{

coast_value:value,
c_type:type,
coast_discription:desc,
co_date:date

}]);

if(error) alert(error.message);

clearForm();
loadCoasts();

}

async function editRow(id){

editID=id;

const {data}=await supabaseClient
.from("coasts")
.select("*")
.eq("coast_id",id)
.single();

document.getElementById("coast_value").value=data.coast_value;
document.getElementById("c_type").value=data.c_type;
document.getElementById("coast_discription").value=data.coast_discription;
document.getElementById("co_date").value=data.co_date;

}

async function updateCoast(){

if(!editID) return alert("اختر سجل للتعديل");

const value=document.getElementById("coast_value").value;
const type=document.getElementById("c_type").value;
const desc=document.getElementById("coast_discription").value;
const date=document.getElementById("co_date").value;

await supabaseClient
.from("coasts")
.update({

coast_value:value,
c_type:type,
coast_discription:desc,
co_date:date

})
.eq("coast_id",editID);

clearForm();
loadCoasts();

}

async function deleteRow(id){

if(!confirm("حذف السجل؟")) return;

await supabaseClient
.from("coasts")
.delete()
.eq("coast_id",id);

loadCoasts();

}

function clearForm(){

editID=null;

document.getElementById("coast_value").value="";
document.getElementById("coast_discription").value="";
document.getElementById("co_date").value="";

}

loadCoasts();

</script>

</body>
</html>
