<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>إدارة القروض</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-r from-blue-50 to-blue-100 min-h-screen p-6">

<div class="max-w-7xl mx-auto bg-white shadow-xl rounded-xl p-6">

<h1 class="text-3xl font-bold text-center text-blue-700 mb-6">
إدارة القروض
</h1>

<div class="flex gap-3 mb-6">

<input id="search"
placeholder="بحث باسم العميل"
class="border p-2 rounded w-full">

<button onclick="renderTable()"
class="bg-green-600 text-white px-5 py-2 rounded">
بحث
</button>

</div>

<div class="grid grid-cols-3 gap-4 mb-6">

<select id="customer_id" class="border p-2 rounded"></select>

<input id="loan_discripton" placeholder="وصف القرض" class="border p-2 rounded">

<input id="loan_value" placeholder="قيمة القرض" class="border p-2 rounded">

<input id="sadad" placeholder="المسدد" class="border p-2 rounded">

<input id="tel" placeholder="الهاتف" class="border p-2 rounded">

<input id="whatsapp" placeholder="واتساب" class="border p-2 rounded">

<input id="email" placeholder="البريد الإلكتروني" class="border p-2 rounded">

<input id="seal_man" placeholder="اسم الموظف" class="border p-2 rounded">

<input id="pay_method" placeholder="طريقة الدفع" class="border p-2 rounded">

<input type="datetime-local" id="loan_date" class="border p-2 rounded">

</div>

<div class="flex gap-3 mb-6">

<button onclick="addLoan()" class="bg-green-600 text-white px-5 py-2 rounded">
إضافة
</button>

<button onclick="updateLoan()" class="bg-yellow-500 text-white px-5 py-2 rounded">
حفظ التعديل
</button>

<button onclick="clearForm()" class="bg-gray-500 text-white px-5 py-2 rounded">
جديد
</button>

<a href="index.html" class="bg-blue-600 text-white px-5 py-2 rounded">
رجوع
</a>

</div>

<div class="overflow-auto">

<table class="w-full border text-center">

<thead class="bg-blue-600 text-white">

<tr>

<th>رقم القرض</th>
<th>اسم العميل</th>
<th>الوصف</th>
<th>قيمة القرض</th>
<th>المسدد</th>
<th>المتبقي</th>
<th>التاريخ</th>
<th>الموظف</th>
<th>طريقة الدفع</th>
<th>اتصال</th>
<th>واتساب</th>
<th>تعديل</th>
<th>حذف</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

<script>

const supabaseUrl="https://vmxbedovoahuggfpcmyk.supabase.co";
const supabaseKey="sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU";

const supabaseClient=supabase.createClient(supabaseUrl,supabaseKey);

let data=[];
let editID=null;

async function loadCustomers(){

const {data:rows,error}=await supabaseClient
.from("customers")
.select("id_customer,first_name")
.order("first_name");

if(error){alert(error.message);return;}

let options="<option value=''>اختر العميل</option>";

rows.forEach(c=>{
options+=`<option value="${c.id_customer}">${c.first_name}</option>`;
});

document.getElementById("customer_id").innerHTML=options;

}

async function loadLoans(){

const {data:rows,error}=await supabaseClient
.from("loans")
.select(`
loan_id,
loan_discripton,
loan_value,
sadad,
tel,
whatsapp,
email,
loan_date,
seal_man,
pay_method,
customer_id,
customers(first_name)
`)
.order("loan_id",{ascending:false});

if(error){alert(error.message);return;}

data=rows;

renderTable();

}

function renderTable(){

let search=document.getElementById("search").value.toLowerCase();

let filtered=data.filter(r=>
(r.customers?.first_name||"").toLowerCase().includes(search)
);

let table="";

filtered.forEach(row=>{

let remain=(row.loan_value||0)-(row.sadad||0);

let date=row.loan_date? new Date(row.loan_date).toLocaleString() : "";

table+=`

<tr class="border">

<td>${row.loan_id}</td>
<td>${row.customers?.first_name||""}</td>
<td>${row.loan_discripton||""}</td>
<td>${row.loan_value||0}</td>
<td>${row.sadad||0}</td>
<td class="text-red-600 font-bold">${remain}</td>
<td>${date}</td>
<td>${row.seal_man||""}</td>
<td>${row.pay_method||""}</td>

<td>
<a href="tel:${row.tel||""}" class="bg-green-500 text-white px-2 py-1 rounded">
📞
</a>
</td>

<td>
<a href="https://wa.me/${row.whatsapp||""}" target="_blank"
class="bg-green-600 text-white px-2 py-1 rounded">
💬
</a>
</td>

<td>
<button onclick="editRow(${row.loan_id})"
class="bg-yellow-400 px-3 py-1 rounded">
تعديل
</button>
</td>

<td>
<button onclick="deleteRow(${row.loan_id})"
class="bg-red-600 text-white px-3 py-1 rounded">
حذف
</button>
</td>

</tr>

`;

});

document.getElementById("tableBody").innerHTML=table;

}

async function addLoan(){

const customer_id=document.getElementById("customer_id").value;

if(!customer_id){

alert("اختر العميل أولا");

return;

}

const loan_discripton=document.getElementById("loan_discripton").value;
const loan_value=document.getElementById("loan_value").value;
const sadad=document.getElementById("sadad").value;
const tel=document.getElementById("tel").value;
const whatsapp=document.getElementById("whatsapp").value;
const email=document.getElementById("email").value;
const seal_man=document.getElementById("seal_man").value;
const pay_method=document.getElementById("pay_method").value;
const loan_date=document.getElementById("loan_date").value;

const {error}=await supabaseClient
.from("loans")
.insert([{
customer_id,
loan_discripton,
loan_value,
sadad,
tel,
whatsapp,
email,
seal_man,
pay_method,
loan_date
}]);

if(error){alert(error.message);return;}

clearForm();
loadLoans();

}

async function editRow(id){

editID=id;

const {data,error}=await supabaseClient
.from("loans")
.select("*")
.eq("loan_id",id)
.single();

if(error){alert(error.message);return;}

document.getElementById("customer_id").value=data.customer_id;
document.getElementById("loan_discripton").value=data.loan_discripton;
document.getElementById("loan_value").value=data.loan_value;
document.getElementById("sadad").value=data.sadad;
document.getElementById("tel").value=data.tel;
document.getElementById("whatsapp").value=data.whatsapp;
document.getElementById("email").value=data.email;
document.getElementById("seal_man").value=data.seal_man;
document.getElementById("pay_method").value=data.pay_method;
document.getElementById("loan_date").value=data.loan_date;

}

async function updateLoan(){

if(!editID){
alert("اختر قرض للتعديل");
return;
}

const loan_discripton=document.getElementById("loan_discripton").value;
const loan_value=document.getElementById("loan_value").value;
const sadad=document.getElementById("sadad").value;

const {error}=await supabaseClient
.from("loans")
.update({loan_discripton,loan_value,sadad})
.eq("loan_id",editID);

if(error){alert(error.message);return;}

clearForm();
loadLoans();

}

async function deleteRow(id){

if(!confirm("هل تريد حذف القرض؟")) return;

const {error}=await supabaseClient
.from("loans")
.delete()
.eq("loan_id",id);

if(error){alert(error.message);return;}

loadLoans();

}

function clearForm(){

editID=null;

document.getElementById("customer_id").value="";
document.getElementById("loan_discripton").value="";
document.getElementById("loan_value").value="";
document.getElementById("sadad").value="";
document.getElementById("tel").value="";
document.getElementById("whatsapp").value="";
document.getElementById("email").value="";
document.getElementById("seal_man").value="";
document.getElementById("pay_method").value="";
document.getElementById("loan_date").value="";

}

document.getElementById("search").addEventListener("input",renderTable);

loadCustomers();
loadLoans();

</script>

</body>
</html>
