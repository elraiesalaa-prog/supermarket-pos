<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة القروض</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{ margin:0; background: linear-gradient(to right, #ebf8ff, #dbeafe); font-family: Arial, sans-serif; }
.scroll{ overflow:auto; }
table th, table td{ white-space: nowrap; }
</style>
</head>

<body>

<!-- هيدر ثابت -->
<div class="bg-blue-700 text-white p-4 text-center text-xl font-bold sticky top-0 z-50">
إدارة القروض
</div>

<!-- محتوى -->
<div class="p-4 flex justify-center">

<div class="w-full max-w-7xl bg-white shadow-xl rounded-xl p-4 flex flex-col gap-4">

<!-- البحث -->
<div class="flex flex-col sm:flex-row gap-3">
<input id="search" placeholder="بحث باسم العميل" class="border p-2 rounded flex-1 w-full">
<button onclick="renderTable()" class="bg-green-600 text-white px-5 py-2 rounded w-full sm:w-auto">بحث</button>
<button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded w-full sm:w-auto">خروج</button>
</div>

<!-- النموذج -->
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
<select id="customer_id" class="border p-2 rounded w-full"></select>
<input id="loan_discripton" placeholder="وصف القرض" class="border p-2 rounded w-full">
<input id="loan_value" placeholder="قيمة القرض" class="border p-2 rounded w-full">
<input id="sadad" placeholder="المسدد" class="border p-2 rounded w-full">
<input id="tel" placeholder="الهاتف" class="border p-2 rounded w-full">
<input id="whatsapp" placeholder="واتساب" class="border p-2 rounded w-full">
<input id="email" placeholder="البريد الإلكتروني" class="border p-2 rounded w-full">
<input id="seal_man" placeholder="اسم الموظف" class="border p-2 rounded w-full">
<input id="pay_method" placeholder="طريقة الدفع" class="border p-2 rounded w-full">
<input type="datetime-local" id="loan_date" class="border p-2 rounded w-full">
</div>

<!-- الأزرار -->
<div class="flex flex-wrap gap-3">
<button onclick="addLoan()" class="bg-green-600 text-white px-5 py-2 rounded flex-1 sm:flex-auto">إضافة</button>
<button onclick="updateLoan()" class="bg-yellow-500 text-white px-5 py-2 rounded flex-1 sm:flex-auto">حفظ التعديل</button>
<button onclick="clearForm()" class="bg-gray-500 text-white px-5 py-2 rounded flex-1 sm:flex-auto">جديد</button>
<button onclick="printLoansPDF()" class="bg-blue-600 text-white px-5 py-2 rounded flex-1 sm:flex-auto">طباعة PDF</button>
<button onclick="history.back()" class="bg-gray-600 text-white px-5 py-2 rounded flex-1 sm:flex-auto">رجوع</button>
</div>

<!-- الجدول -->
<div class="overflow-x-auto border rounded">
<table class="w-full min-w-[1200px] border text-center">
<thead class="bg-blue-600 text-white sticky top-0">
<tr>
<th>رقم القرض</th>
<th>اسم العميل</th>
<th>الوصف</th>
<th>قيمة القرض</th>
<th>المسدد</th>
<th>المتبقي</th>
<th>التاريخ</th>
<th>الموظف</th>
<th>طريقة الدفع</th>
<th>اتصال</th>
<th>واتساب</th>
<th>تعديل</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>
</div>

<script>
const supabaseUrl = "https://vmxbedovoahuggfpcmyk.supabase.co";
const supabaseKey = "sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let data=[], editID=null;

document.addEventListener("DOMContentLoaded", function(){
if(!localStorage.getItem("user")) window.location="index.html";
});

async function loadCustomers(){
const {data: rows, error}=await supabaseClient.from("customers").select("id_customer,first_name").order("first_name");
if(error){ alert(error.message); return; }
let options="<option value=''>اختر العميل</option>";
rows.forEach(c=>options+=`<option value="${c.id_customer}">${c.first_name}</option>`);
document.getElementById("customer_id").innerHTML=options;
}

async function loadLoans(){
const {data: rows, error}=await supabaseClient.from("loans").select(`loan_id,loan_discripton,loan_value,sadad,tel,whatsapp,email,loan_date,seal_man,pay_method,customer_id,customers(first_name)`).order("loan_id",{ascending:false});
if(error){ alert(error.message); return; }
data=rows;
renderTable();
}

function renderTable(){
const search=document.getElementById("search").value.toLowerCase();
const filtered=data.filter(r=>(r.customers?.first_name||"").toLowerCase().includes(search));
let table="";
filtered.forEach(row=>{
const remain=(row.loan_value||0)-(row.sadad||0);
const date=row.loan_date?new Date(row.loan_date).toLocaleString():"";
table+=`<tr class="border hover:bg-gray-50">
<td>${row.loan_id}</td>
<td>${row.customers?.first_name||""}</td>
<td>${row.loan_discripton||""}</td>
<td>${row.loan_value||0}</td>
<td>${row.sadad||0}</td>
<td class="text-red-600 font-bold">${remain}</td>
<td>${date}</td>
<td>${row.seal_man||""}</td>
<td>${row.pay_method||""}</td>
<td><a href="tel:${row.tel||""}" class="bg-green-500 text-white px-2 py-1 rounded">📞</a></td>
<td><a href="https://wa.me/${row.whatsapp||""}" target="_blank" class="bg-green-600 text-white px-2 py-1 rounded">💬</a></td>
<td><button onclick="editRow(${row.loan_id})" class="bg-yellow-400 px-3 py-1 rounded">تعديل</button></td>
<td><button onclick="deleteRow(${row.loan_id})" class="bg-red-600 text-white px-3 py-1 rounded">حذف</button></td>
</tr>`;
});
document.getElementById("tableBody").innerHTML=table;
}

function logout(){ localStorage.removeItem("user"); localStorage.removeItem("role"); window.location="index.html"; }

document.getElementById("search").addEventListener("input", renderTable);

loadCustomers();
loadLoans();
</script>

</body>
</html>
