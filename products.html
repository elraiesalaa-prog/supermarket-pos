<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>إدارة المنتجات</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Tahoma;
background:#f4f6f9;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

input,select{
padding:8px;
border:1px solid #ccc;
border-radius:5px;
width:100%;
}

button{
padding:8px 15px;
border:none;
border-radius:5px;
cursor:pointer;
}

.save{background:#28a745;color:white}
.edit{background:#ffc107}
.delete{background:#dc3545;color:white}
.logout{background:#333;color:white;float:left}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#007bff;
color:white;
}

</style>

</head>

<body>

<div class="container">

<button class="logout" onclick="logout()">خروج</button>

<h2>إدارة المنتجات</h2>

<input type="text" id="searchBox" placeholder="بحث عن منتج..." onkeyup="searchProduct()">

<br><br>

<div class="grid">

<input id="product_name" placeholder="اسم المنتج">

<input id="pay_qte" type="number" placeholder="كمية الشراء">

<input id="pice_qte" type="number" placeholder="عدد القطع">


<input id="pay_price" type="number" placeholder="سعر الشراء">

<input id="seal_price" type="number" placeholder="سعر البيع">

<input id="pay_date" type="date">

<input id="expare_date" type="date">

<input id="req_id" placeholder="رقم الطلب">



<select id="id_cat"></select>

<input id="p_weight" placeholder="الوزن">

</div>

<br>

<button class="save" onclick="saveProduct()">حفظ المنتج</button>

<table>

<thead>

<tr>

<th>ID</th>
<th>المنتج</th>
<th>المخزون</th>
<th>سعر البيع</th>
<th>الصنف</th>
<th>تعديل</th>
<th>حذف</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<script>

const supabaseClient = window.supabase.createClient(
"https://vmxbedovoahuggfpcmyk.supabase.co",
"sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU"
)

let edit_id=null
let products=[]


// تحميل الأصناف
async function loadCategories(){

const {data}=await supabaseClient
.from("categories")
.select("*")
.order("description_cat")

let html=""

data.forEach(c=>{

html+=`<option value="${c.id_cat}">${c.description_cat}</option>`

})

document.getElementById("id_cat").innerHTML=html

}


// تحميل المنتجات
async function loadProducts(){

const {data}=await supabaseClient
.from("products")
.select("*")

products=data

renderTable(products)

}


// عرض الجدول
function renderTable(list){

let html=""

list.forEach(p=>{

html+=`

<tr>

<td>${p.id_product}</td>

<td>${p.product_name}</td>

<td>${p.qte_in_stock}</td>

<td>${p.seal_price}</td>

<td>${p.id_cat}</td>

<td>
<button class="edit" onclick="editProduct(${p.id_product})">تعديل</button>
</td>

<td>
<button class="delete" onclick="deleteProduct(${p.id_product})">حذف</button>
</td>

</tr>

`

})

document.getElementById("tableBody").innerHTML=html

}


// حفظ
async function saveProduct(){

let data={

product_name: product_name.value || null,

pay_qte: pay_qte.value ? Number(pay_qte.value) : null,

pice_qte: pice_qte.value ? Number(pice_qte.value) : null,

qte_in_stock: qte_in_stock.value ? Number(qte_in_stock.value) : null,

pay_price: pay_price.value ? Number(pay_price.value) : null,

seal_price: seal_price.value ? Number(seal_price.value) : null,

pay_date: pay_date.value || null,

expare_date: expare_date.value || null,

req_id: req_id.value || null,

coasts_value: coasts_value.value ? Number(coasts_value.value) : null,

id_cat: id_cat.value ? Number(id_cat.value) : null,

p_weight: p_weight.value || null

}

if(edit_id==null){

await supabaseClient
.from("products")
.insert([data])

}else{

await supabaseClient
.from("products")
.update(data)
.eq("id_product",edit_id)

edit_id=null

}

clearForm()
loadProducts()

}
// تعديل
function editProduct(id){

let p=products.find(x=>x.id_product==id)

product_name.value=p.product_name
pay_qte.value=p.pay_qte
pice_qte.value=p.pice_qte
qte_in_stock.value=p.qte_in_stock
pay_price.value=p.pay_price
seal_price.value=p.seal_price
pay_date.value=p.pay_date
expare_date.value=p.expare_date
req_id.value=p.req_id
coasts_value.value=p.coasts_value
id_cat.value=p.id_cat
p_weight.value=p.p_weight

edit_id=id

}


// حذف
async function deleteProduct(id){

if(!confirm("تأكيد الحذف؟")) return

await supabaseClient
.from("products")
.delete()
.eq("id_product",id)

loadProducts()

}


// بحث
function searchProduct(){

let word=searchBox.value.toLowerCase()

let filtered=products.filter(p =>
p.product_name?.toLowerCase().includes(word)
)

renderTable(filtered)

}


// مسح الحقول
function clearForm(){

document.querySelectorAll("input").forEach(i=>i.value="")

}


// خروج
function logout(){

window.location.href="index.html"

}


loadCategories()
loadProducts()

</script>

</body>
</html>
