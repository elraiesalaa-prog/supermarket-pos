<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>تقرير أوزان المنتجات</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-blue-50 p-6">

<div class="max-w-6xl mx-auto bg-white shadow-xl rounded-xl p-6">

<h1 class="text-3xl font-bold text-center text-blue-700 mb-6">
تقرير أوزان المنتجات
</h1>

<!-- البحث -->

<div class="mb-4 flex gap-2">

<input id="searchInput"
placeholder="بحث باسم المنتج"
class="border p-2 rounded w-full">

<button onclick="renderTable()"
class="bg-green-600 text-white px-5 py-2 rounded">
بحث
</button>

</div>

<!-- الجدول -->

<div class="overflow-auto">

<table class="w-full border text-center">

<thead class="bg-blue-600 text-white">

<tr>

<th class="p-2">اسم المنتج</th>

<th class="p-2">رقم الطلبية</th>

<th class="p-2">الوزن</th>

<th class="p-2">نوع الوزن</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<!-- الأزرار -->

<div class="flex gap-3 mt-6">

<a href="products.html"
class="bg-yellow-500 hover:bg-yellow-600 text-white px-5 py-2 rounded">
تعديل المنتجات
</a>

<a href="index.html"
class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded">
رجوع
</a>

</div>

</div>

<script>

const supabaseUrl="https://vmxbedovoahuggfpcmyk.supabase.co";
const supabaseKey="sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU";

const supabaseClient=supabase.createClient(supabaseUrl,supabaseKey);

let data=[];

async function loadData(){

const {data:rows,error}=await supabaseClient
.from("products_weight_report")
.select("*");

if(error){
alert(error.message);
return;
}

data=rows;

renderTable();

}

function renderTable(){

let search=document.getElementById("searchInput").value.toLowerCase();

let filtered=data;

if(search){

filtered=data.filter(r=>
(r.product_name||"").toLowerCase().includes(search)
);

}

let table="";

filtered.forEach(row=>{

table+=`

<tr class="border">

<td>${row.product_name}</td>

<td>${row.req_id||""}</td>

<td>${row.weight||""}</td>

<td>${row.weight_type}</td>

</tr>

`;

});

document.getElementById("tableBody").innerHTML=table;

}

loadData();

</script>

</body>

</html>
