نعم عدلها وهذا هو الكود
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>تصنيف المنتجات حسب الوزن</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-blue-50 p-6">

<div class="max-w-7xl mx-auto bg-white shadow-xl rounded-xl p-6">

<h1 class="text-3xl font-bold text-center text-blue-700 mb-6">
تصنيف المنتجات حسب الوزن
</h1>

<!-- زر الطباعة -->
<div class="mb-4 text-left">
<button onclick="printPDF()" 
class="bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded-lg shadow-md">
🖨️ طباعة PDF
</button>
</div>

<!-- البحث -->
<div class="flex gap-3 mb-6">
<input id="search"
placeholder="بحث باسم المنتج"
class="border p-2 rounded w-full">

<button onclick="renderTables()"
class="bg-green-600 text-white px-5 py-2 rounded">
بحث
</button>
</div>

<!-- منتجات بالكيلو -->
<h2 class="text-xl font-bold text-green-700 mb-2">🟢 منتجات بالكيلو</h2>

<table class="w-full border text-center mb-6">
<thead class="bg-green-600 text-white">
<tr>
<th class="p-2">اسم المنتج</th>
<tr>
<th class="p-2">الوزن</th>
</tr>
</thead>
<tbody id="kiloTable"></tbody>
</table>

<!-- منتجات بالرطل -->
<h2 class="text-xl font-bold text-yellow-700 mb-2">🟡 منتجات بالرطل</h2>

<table class="w-full border text-center mb-6">
<thead class="bg-yellow-600 text-white">
<tr>
<th class="p-2">اسم المنتج</th>
<tr>
<th class="p-2">الوزن</th>
</tr>
</thead>
<tbody id="ratlTable"></tbody>
</table>

<!-- منتجات بدون وزن -->
<h2 class="text-xl font-bold text-red-700 mb-2">🔴 منتجات بدون وزن</h2>

<table class="w-full border text-center mb-6">
<thead class="bg-red-600 text-white">
<tr>
<th class="p-2">اسم المنتج</th>
<tr>
<th class="p-2">الوزن</th>
</tr>
</thead>
<tbody id="emptyTable"></tbody>
</table>

<!-- أزرار -->
<div class="flex gap-3 mt-6">
<a href="products.html"
class="bg-yellow-500 hover:bg-yellow-600 text-white px-5 py-2 rounded">
تعديل المنتجات
</a>

<a href="index.html"
class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded">
رجوع
</a>
</div>

</div>

<script>

// ================== إعداد Supabase ==================
const supabaseUrl="https://vmxbedovoahuggfpcmyk.supabase.co";
const supabaseKey="sb_publishable_y-bZryAIeagBLR0Kg0mw2Q_YwpmadhU";
const supabaseClient=supabase.createClient(supabaseUrl,supabaseKey);

let reportData=[];

// ================== تحميل البيانات ==================
async function loadData(){

const {data,error}=await supabaseClient
.from("products_weight_report")
.select("*");

if(error){
console.error(error);
alert(error.message);
return;
}

reportData=data;
renderTables();

}

// ================== عرض البيانات ==================
function renderTables(){

let search=document.getElementById("search").value.toLowerCase();

let kilo="";
let ratl="";
let empty="";

reportData.forEach(row=>{

let name=(row.product_name||"").toLowerCase();

if(search && !name.includes(search)) return;

let tr=`
<tr class="border">
<td>${row.product_name}</td>
<td>${row.req_id||""}</td>
<td>${row.p_weight||""}</td>
</tr>
`;

if(row.p_weight==="كيلو") kilo+=tr;
else if(row.p_weight==="رطل") ratl+=tr;
else empty+=tr;

});

document.getElementById("kiloTable").innerHTML=kilo;
document.getElementById("ratlTable").innerHTML=ratl;
document.getElementById("emptyTable").innerHTML=empty;

}

// ================== تشغيل ==================
document.getElementById("search")
.addEventListener("input",renderTables);

loadData();


// ================== PDF ==================
window.printPDF = async function () {

const { data, error } = await supabaseClient
.from('products_weight_report')
.select('*');

if (error) {
alert("خطأ في تحميل البيانات");
return;
}

// الحاوية
const container = document.createElement("div");
container.setAttribute("dir", "rtl");
container.style.fontFamily = "Tahoma";
container.style.padding = "10px";

// العنوان
const title = document.createElement("h2");
title.innerText = "تقرير تصنيف المنتجات حسب الوزن";
title.style.textAlign = "center";
title.style.marginBottom = "15px";
container.appendChild(title);

// دالة إنشاء جدول
function createTable(titleText, color, rows){

if(rows.length === 0) return;

const sectionTitle = document.createElement("h3");
sectionTitle.innerText = titleText;
sectionTitle.style.margin = "10px 0";
sectionTitle.style.color = color;
container.appendChild(sectionTitle);

const table = document.createElement("table");
table.style.width = "100%";
table.style.borderCollapse = "collapse";
table.style.textAlign = "center";

let html = `
<thead>
<tr>
<th style="border:1px solid #000;padding:6px;background:${color};color:#fff;">اسم المنتج</th>
<tr>
<th style="border:1px solid #000;padding:6px;background:${color};color:#fff;">الوزن</th>
</tr>
</thead>
<tbody>
`;

rows.forEach(r=>{
html+=`
<tr>
<td style="border:1px solid #000;padding:5px;">${r.product_name}</td>

<td style="border:1px solid #000;padding:5px;">${r.p_weight||""}</td>
</tr>
`;
});

html+="</tbody>";

table.innerHTML=html;
container.appendChild(table);

}

// تقسيم البيانات
const kilo = data.filter(r=>r.p_weight==="كيلو");
const ratl = data.filter(r=>r.p_weight==="رطل");
const empty = data.filter(r=>!r.p_weight);

// إنشاء الجداول
createTable("🟢 منتجات بالكيلو","#16a34a",kilo);
createTable("🟡 منتجات بالرطل","#ca8a04",ratl);
createTable("🔴 منتجات بدون وزن","#dc2626",empty);

// إعداد PDF
const opt = {
margin: 0.5,
filename: "تقرير_تصنيف_المنتجات.pdf",
image: { type: "jpeg", quality: 1 },
html2canvas: { scale: 3 },
jsPDF: { unit: "cm", format: "a4", orientation: "portrait" }
};

// إنشاء PDF
html2pdf().set(opt).from(container).save();

};

</script>

</body>
</html>
